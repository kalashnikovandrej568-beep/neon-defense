    const pulseCore = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.3);
    pulseCore.addColorStop(0, '#ffffff');
    pulseCore.addColorStop(0.4, color);
    pulseCore.addColorStop(1, color + '00');
    ctx.fillStyle = pulseCore;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.2, 0, Math.PI * 2);
    ctx.fill();

  } else if (type === 'void') {
    // Void - dark swirling vortex
    ctx.fillStyle = '#05001122';
    ctx.beginPath();
    ctx.arc(0, 0, size * 1.2, 0, Math.PI * 2);
    ctx.fill();
    // Spiral tendrils
    for (let s = 0; s < 4; s++) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      const startA = -angle * 3 + s * Math.PI / 2;
      for (let j = 0; j <= 24; j++) {
        const t = j / 24;
        const a = startA + t * Math.PI * 2;
        const r = size * (1.1 - t * 0.8);
        const px = Math.cos(a) * r;
        const py = Math.sin(a) * r;
        j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.globalAlpha = 0.5;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // Dark core with purple rim
    const voidGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.5);
    voidGrad.addColorStop(0, '#000000');
    voidGrad.addColorStop(0.5, '#110022');
    voidGrad.addColorStop(0.8, color + '66');
    voidGrad.addColorStop(1, color + '00');
    ctx.fillStyle = voidGrad;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.45, 0, Math.PI * 2);
    ctx.fill();
    // Event horizon ring
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.35, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawEnemy(e) {
  const size = e.size * cellSize * 0.45;
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.fillStyle = e.color + 'aa';
  ctx.strokeStyle = e.color;
  ctx.lineWidth = 2;

  // Slow effect visual
  if (e.slowTimer > 0) {
    ctx.strokeStyle = '#4488ff';
  }

  if (e.shape === 'diamond') {
    ctx.rotate(Math.PI / 4 + gameTime * 3);
    ctx.fillRect(-size, -size, size * 2, size * 2);
    ctx.strokeRect(-size, -size, size * 2, size * 2);
  } else if (e.shape === 'triangle') {
    // Phantom — stealth shimmer
    const stealthAlpha = 0.35 + Math.sin(gameTime * 6 + e.id) * 0.2;
    ctx.globalAlpha = stealthAlpha;
    ctx.rotate(gameTime * 4);
    ctx.beginPath();
    for (let i = 0; i < 3; i++) {
      const a = Math.PI * 2 / 3 * i - Math.PI / 2;
      ctx.lineTo(Math.cos(a) * size * 1.2, Math.sin(a) * size * 1.2);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Inner glow
    ctx.fillStyle = '#ffffff22';
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  } else if (e.shape === 'square') {
    ctx.rotate(gameTime * 0.5);
    ctx.fillRect(-size, -size, size * 2, size * 2);
    ctx.strokeRect(-size, -size, size * 2, size * 2);
  } else if (e.shape === 'pentagon') {
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = Math.PI * 2 / 5 * i - Math.PI / 2;
      const x = Math.cos(a) * size * 1.1;
      const y = Math.sin(a) * size * 1.1;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  } else if (e.shape === 'octagon') {
    ctx.rotate(gameTime * 0.3);
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = Math.PI * 2 / 8 * i;
      const x = Math.cos(a) * size * 1.2;
      const y = Math.sin(a) * size * 1.2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Inner glow for boss
    ctx.fillStyle = '#ffffff44';
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.4 + Math.sin(gameTime * 5) * 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
  // Health bar
  const barW = size * 2.5;
  const barH = 4;
  const barX = e.x - barW / 2;
  const barY = e.y - size * 1.5 - 6;
  const hpRatio = e.hp / e.maxHp;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
  const hpColor = hpRatio > 0.6 ? '#00ff88' : hpRatio > 0.3 ? '#ffaa00' : '#ff2244';
  ctx.fillStyle = hpColor;
  ctx.fillRect(barX, barY, barW * hpRatio, barH);
}

function drawBeam(b) {
  const alpha = b.life / b.maxLife;
  ctx.globalAlpha = alpha;
  if (b.tesla) {
    // Jagged lightning
    ctx.strokeStyle = b.color;
    ctx.lineWidth = b.width;
    ctx.beginPath();
    ctx.moveTo(b.x1, b.y1);
    const dx = b.x2 - b.x1;
    const dy = b.y2 - b.y1;
    const segments = 6;
    for (let i = 1; i < segments; i++) {
      const t = i / segments;
      const jitter = 12;
      ctx.lineTo(
        b.x1 + dx * t + (Math.random() - 0.5) * jitter,
        b.y1 + dy * t + (Math.random() - 0.5) * jitter
      );
    }
    ctx.lineTo(b.x2, b.y2);
    ctx.stroke();
    // Inner bright core
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = b.width * 0.4;
    ctx.stroke();
  } else if (b.cryo) {
    // Shimmering beam
    ctx.strokeStyle = b.color;
    ctx.lineWidth = b.width;
    ctx.beginPath();
    ctx.moveTo(b.x1, b.y1);
    const dx = b.x2 - b.x1, dy = b.y2 - b.y1;
    const segments = 8;
    for (let i = 1; i < segments; i++) {
      const t = i / segments;
      const j = Math.sin(gameTime * 20 + i * 2) * 4;
      const nx = -dy / Math.hypot(dx, dy);
      const ny = dx / Math.hypot(dx, dy);
      ctx.lineTo(b.x1 + dx * t + nx * j, b.y1 + dy * t + ny * j);
    }
    ctx.lineTo(b.x2, b.y2);
    ctx.stroke();
  } else {
    // Straight laser beam
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = b.width + 2;
    ctx.beginPath();
    ctx.moveTo(b.x1, b.y1);
    ctx.lineTo(b.x2, b.y2);
    ctx.stroke();
    ctx.strokeStyle = b.color;
    ctx.lineWidth = b.width;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawProjectile(p) {
  // Trail
  for (let i = 0; i < p.trail.length; i++) {
    const t = p.trail[i];
    const alpha = (t.life / 0.2) * 0.5;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(t.x, t.y, p.size * (i / p.trail.length) * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  // Core with gradient
  const coreGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
  coreGrad.addColorStop(0, '#ffffff');
  coreGrad.addColorStop(0.4, p.color);
  coreGrad.addColorStop(1, p.color + '00');
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
  ctx.fill();
}

function drawHUD() {
  const W = logicalW, H = logicalH;
  ctx.textBaseline = 'top';
  ctx.font = 'bold 16px "Segoe UI", monospace';
  
  // Credits
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffcc00';
  ctx.fillText('⬡ ' + credits, 20, 15);
  
  // Lives
  ctx.fillStyle = '#ff0066';
  ctx.fillText('♥ ' + lives, 20, 40);

  // Score
  ctx.fillStyle = '#ff00ff';
  ctx.fillText('★ ' + score, 20, 65);

  // Tech points
  ctx.fillStyle = '#ffaa00';
  ctx.fillText('⚡ ' + techPoints + ' TP', 20, 90);

  // Wave
  ctx.textAlign = 'right';
  ctx.fillStyle = '#00ffff';
  ctx.fillText('WAVE ' + wave, W - 20, 15);

  // Speed control button
  const speedBtnW = 50, speedBtnH = 22;
  const speedBtnX = W - 75, speedBtnY = 38;
  ctx.fillStyle = gameSpeed > 1 ? 'rgba(255,200,0,0.15)' : 'rgba(0,255,255,0.08)';
  ctx.strokeStyle = gameSpeed > 1 ? '#ffcc0088' : '#00ffff44';
  ctx.lineWidth = 1;
  ctx.fillRect(speedBtnX, speedBtnY, speedBtnW, speedBtnH);
  ctx.strokeRect(speedBtnX, speedBtnY, speedBtnW, speedBtnH);
  ctx.font = 'bold 13px monospace';
  ctx.fillStyle = gameSpeed > 1 ? '#ffcc00' : '#00ffff';
  ctx.textAlign = 'center';
  ctx.fillText('\u25B6'.repeat(gameSpeed) + ' ' + gameSpeed + 'x', speedBtnX + speedBtnW / 2, speedBtnY + speedBtnH / 2 + 1);
  ctx.textBaseline = 'top';
  speedBtnBounds = { x: speedBtnX, y: speedBtnY, w: speedBtnW, h: speedBtnH };

  // Auto-wave toggle button
  const awBtnW = 50, awBtnH = 22;
  const awBtnX = W - 75, awBtnY = 64;
  ctx.fillStyle = autoWave ? 'rgba(0,255,136,0.15)' : 'rgba(60,30,80,0.3)';
  ctx.strokeStyle = autoWave ? '#00ff8844' : '#44335544';
  ctx.lineWidth = 1;
  ctx.fillRect(awBtnX, awBtnY, awBtnW, awBtnH);
  ctx.strokeRect(awBtnX, awBtnY, awBtnW, awBtnH);
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = autoWave ? '#00ff88' : '#555566';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('AUTO', awBtnX + awBtnW / 2, awBtnY + awBtnH / 2);
  ctx.textBaseline = 'top';
  autoWaveBtnBounds = { x: awBtnX, y: awBtnY, w: awBtnW, h: awBtnH };

  // High score (small, top right)
  ctx.textAlign = 'right';
  ctx.font = '11px monospace';
  ctx.fillStyle = '#666688';
  ctx.fillText('HI: ' + highScore, W - 20, 90);

  // Enemies remaining
  if (waveActive) {
    ctx.font = '13px "Segoe UI", monospace';
    ctx.fillStyle = '#00ffcc';
    ctx.fillText('Enemies: ' + (enemies.length + waveQueue.length), W - 20, 40);
  }
  ctx.textAlign = 'left';

  // Next wave / start wave button
  if (!waveActive && gamePhase === 'playing') {
    const btnX = W / 2 - 100;
    const btnY = gridY - 55;
    const btnW = 200, btnH = 28;
    // Background
    ctx.fillStyle = 'rgba(0,255,255,0.08)';
    ctx.strokeStyle = '#00ffff88';
    ctx.lineWidth = 1;
    ctx.fillRect(btnX, btnY, btnW, btnH);
    ctx.strokeRect(btnX, btnY, btnW, btnH);
    // Text
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 14px "Segoe UI", monospace';
    ctx.fillStyle = '#00ffff';
    const pulse = 0.7 + Math.sin(gameTime * 4) * 0.3;
    ctx.globalAlpha = pulse;
    ctx.fillText('\u25b6 NEXT WAVE (' + (wave + 1) + ')' + (autoWave ? '  [AUTO ' + Math.ceil(autoWaveTimer) + 's]' : ''), W / 2, btnY + btnH / 2);
    ctx.globalAlpha = 1;
    // Wave preview
    const preview = getWavePreview(wave + 1);
    ctx.font = '11px monospace';
    ctx.textBaseline = 'top';
    let previewX = btnX;
    const previewY = btnY + btnH + 4;
    const previewParts = [];
    for (const [type, count] of Object.entries(preview)) {
      previewParts.push({ type, count, color: ENEMY_DEFS[type].color });
    }
    const previewTotalW = previewParts.reduce((s, p) => s + (p.type.length + String(p.count).length + 3) * 7, 0);
    let px = W / 2 - previewTotalW / 2;
    for (const p of previewParts) {
      ctx.fillStyle = p.color;
      ctx.textAlign = 'left';
      const label = p.count + 'x ' + p.type.toUpperCase();
      ctx.fillText(label, px, previewY);
      px += (label.length + 2) * 7;
    }
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    // Store button bounds for click handling
    nextWaveBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
  } else {
    nextWaveBtn = null;
  }

  // Controls hint (top-center, always visible)
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.font = '11px monospace';
  ctx.fillStyle = '#666688';
  ctx.globalAlpha = 0.7;
  if (isMobile) {
    ctx.fillText('TAP — place/select  |  SWIPE ↕ — camera  |  ⚡ tech tree', W / 2, 4);
  } else {
    ctx.fillText('1-8 towers  |  SPACE wave  |  TAB tech  |  +/- speed  |  A auto-wave  |  RMB sell', W / 2, 4);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';

  // Selected tower info panel (stays open when clicked)
  const infoTower = selectedTowerKey ? towers.get(selectedTowerKey) : null;
  if (infoTower && !selectedType) {
    const t = infoTower;
    const def = TOWER_DEFS[t.type];
    const camOffset = camYSmooth * H;
    const infoW = 170, infoH = 130;
    let infoX = t.x + cellSize * 1.2;
    let infoY = t.y + camOffset - infoH / 2;
    // Keep on screen
    if (infoX + infoW > W - 10) infoX = t.x - cellSize - infoW;
    if (infoY < 10) infoY = 10;
    if (infoY + infoH > H - PANEL_H - 10) infoY = H - PANEL_H - 10 - infoH;

    // Panel bg with rounded corners
    ctx.fillStyle = 'rgba(8,0,20,0.95)';
    ctx.strokeStyle = t.color + '88';
    ctx.lineWidth = 2;
    const cr = 8;
    ctx.beginPath();
    ctx.moveTo(infoX + cr, infoY);
    ctx.lineTo(infoX + infoW - cr, infoY);
    ctx.quadraticCurveTo(infoX + infoW, infoY, infoX + infoW, infoY + cr);
    ctx.lineTo(infoX + infoW, infoY + infoH - cr);
    ctx.quadraticCurveTo(infoX + infoW, infoY + infoH, infoX + infoW - cr, infoY + infoH);
    ctx.lineTo(infoX + cr, infoY + infoH);
    ctx.quadraticCurveTo(infoX, infoY + infoH, infoX, infoY + infoH - cr);
    ctx.lineTo(infoX, infoY + cr);
    ctx.quadraticCurveTo(infoX, infoY, infoX + cr, infoY);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Close "x" in top right
    ctx.font = '13px monospace';
    ctx.fillStyle = '#666688';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText('✕', infoX + infoW - 8, infoY + 6);
    towerCloseBtn = { x: infoX + infoW - 22, y: infoY + 2, w: 20, h: 18 };
    ctx.textAlign = 'left';

    // Header with colored bar
    ctx.fillStyle = t.color + '44';
    ctx.fillRect(infoX + 1, infoY + 1, infoW - 2, 24);
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = t.color;
    ctx.textBaseline = 'top';
    ctx.fillText(def.name + ' Lv.' + t.level, infoX + 10, infoY + 5);

    // Stats
    ctx.font = '11px monospace';
    ctx.fillStyle = '#ccccee';
    ctx.fillText('DMG: ' + t.dmg, infoX + 10, infoY + 32);
    ctx.fillText('Range: ' + (t.range / cellSize).toFixed(1), infoX + 85, infoY + 32);
    ctx.fillStyle = '#aaaacc';
    ctx.fillText('Kills: ' + t.kills, infoX + 10, infoY + 48);
    ctx.fillText('Rate: ' + t.rate.toFixed(2) + 's', infoX + 85, infoY + 48);

    // ---- UPGRADE BUTTON ----
    const btnW2 = infoW - 20, btnH2 = 24;
    if (t.level < 3) {
      const ucost = Math.floor(def.cost * t.level * 0.7);
      const canUp = credits >= ucost;
      const ux = infoX + 10, uy = infoY + 68;
      // Button bg
      ctx.fillStyle = canUp ? 'rgba(0,255,100,0.15)' : 'rgba(80,30,30,0.25)';
      ctx.strokeStyle = canUp ? '#00ff6699' : '#44222266';
      ctx.lineWidth = 1.5;
      roundedRect(ux, uy, btnW2, btnH2, 4);
      ctx.fill();
      ctx.stroke();
      // Hover highlight
      if (canUp && mouseX >= ux && mouseX <= ux + btnW2 && mouseY >= uy && mouseY <= uy + btnH2) {
        ctx.fillStyle = 'rgba(0,255,100,0.1)';
        roundedRect(ux, uy, btnW2, btnH2, 4);
        ctx.fill();
      }
      ctx.font = 'bold 12px monospace';
      ctx.fillStyle = canUp ? '#00ff88' : '#553333';
      ctx.textBaseline = 'top';
      ctx.fillText('⬆ UPGRADE  ' + ucost + '¢', ux + 12, uy + 5);
      towerUpgradeBtn = { x: ux, y: uy, w: btnW2, h: btnH2, key: t.col + ',' + t.row };
    } else {
      ctx.fillStyle = '#ffcc00';
      ctx.font = 'bold 12px monospace';
      ctx.fillText('★ MAX LEVEL ★', infoX + 10, infoY + 73);
      towerUpgradeBtn = null;
    }

    // ---- SELL BUTTON ----
    const refund = Math.floor(def.cost * 0.5 * t.level);
    const sx2 = infoX + 10, sy2 = infoY + (t.level < 3 ? 98 : 95);
    ctx.fillStyle = 'rgba(255,60,40,0.15)';
    ctx.strokeStyle = '#ff444488';
    ctx.lineWidth = 1.5;
    roundedRect(sx2, sy2, btnW2, btnH2, 4);
    ctx.fill();
    ctx.stroke();
    // Hover highlight
    if (mouseX >= sx2 && mouseX <= sx2 + btnW2 && mouseY >= sy2 && mouseY <= sy2 + btnH2) {
      ctx.fillStyle = 'rgba(255,60,40,0.1)';
      roundedRect(sx2, sy2, btnW2, btnH2, 4);
      ctx.fill();
    }
    ctx.font = 'bold 12px monospace';
    ctx.fillStyle = '#ff6644';
    ctx.textBaseline = 'top';
    ctx.fillText('✕ SELL  +' + refund + '¢', sx2 + 12, sy2 + 5);
    towerSellBtn = { x: sx2, y: sy2, w: btnW2, h: btnH2, key: t.col + ',' + t.row };
  } else {
    towerUpgradeBtn = null;
    towerSellBtn = null;
    towerCloseBtn = null;
  }
}

// ─── UNLOCK TECH ─────────────────────────────────
function unlockTech(tech) {
  if (unlockedTech.has(tech.id)) return;
  if (techPoints < tech.cost) return;
  if (tech.requires && !unlockedTech.has(tech.requires)) return;
  techPoints -= tech.cost;
  unlockedTech.add(tech.id);
  // Unlock tower if applicable
  if (tech.unlocks && TOWER_DEFS[tech.unlocks]) {
    TOWER_DEFS[tech.unlocks].locked = false;
  }
  // Apply stat bonuses to existing towers
  if (tech.id === 'dmg1') {
    for (const [,t] of towers) { t.dmg = Math.floor(t.dmg * 1.2); }
  }
  if (tech.id === 'dmg2') {
    for (const [,t] of towers) { t.dmg = Math.floor(t.dmg * 1.3); }
  }
  if (tech.id === 'dmg3') {
    for (const [,t] of towers) { t.dmg = Math.floor(t.dmg * 1.5); }
  }
  if (tech.id === 'range1') {
    for (const [,t] of towers) { t.range *= 1.15; }
  }
  if (tech.id === 'rate1') {
    for (const [,t] of towers) { t.rate *= 0.8; }
  }
  // Floating text feedback
  spawnFloatingText(logicalW / 2, logicalH * 0.5, '\u2713 ' + tech.name, tech.color, 22);
  playSfx('place');
  screenShake = { x: 0, y: 0, intensity: 8 };
}

function getTechDmgMultiplier() {
  let m = 1;
  if (unlockedTech.has('dmg1')) m *= 1.2;
  if (unlockedTech.has('dmg2')) m *= 1.3;
  if (unlockedTech.has('dmg3')) m *= 1.5;
  return m;
}
function getTechRangeMultiplier() {
  let m = 1;
  if (unlockedTech.has('range1')) m *= 1.15;
  return m;
}
function getTechRateMultiplier() {
  let m = 1;
  if (unlockedTech.has('rate1')) m *= 0.8; // lower = faster
  return m;
}
function getTechRewardMultiplier() {
  let m = 1;
  if (unlockedTech.has('econ1')) m *= 1.25;
  return m;
}

function roundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawPanel() {
  const W = logicalW, H = logicalH;
  const panelY = H - PANEL_H;
  // Panel background
  ctx.fillStyle = 'rgba(5,0,15,0.92)';
  ctx.fillRect(0, panelY, W, PANEL_H);
  // Top border
  ctx.strokeStyle = '#ff00ff44';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, panelY);
  ctx.lineTo(W, panelY);
  ctx.stroke();
  // Tower slots — responsive sizing
  const types = Object.keys(TOWER_DEFS);
  const gap = isMobile ? 4 : 8;
  const maxSlotW = 110;
  const availW = W - 20;
  const slotW = Math.min(maxSlotW, Math.floor((availW - (types.length - 1) * gap) / types.length));
  const compact = slotW < 80; // very small screen → icon-only mode
  const slotH = compact ? 60 : 80;
  const totalW = types.length * slotW + (types.length - 1) * gap;
  const startX = (W - totalW) / 2;
  const slotY = panelY + (compact ? 8 : 15);

  towerSlots = [];
  for (let i = 0; i < types.length; i++) {
    const type = types[i];
    const def = TOWER_DEFS[type];
    const sx = startX + i * (slotW + gap);
    const isSelected = selectedType === type;
    const isLocked = def.locked;
    const canAfford = !isLocked && credits >= def.cost;

    towerSlots.push({ x: sx, y: slotY, w: slotW, h: slotH, type });

    // Slot background
    if (isLocked) {
      ctx.fillStyle = 'rgba(10,3,20,0.85)';
      ctx.strokeStyle = '#222233';
    } else {
      ctx.fillStyle = isSelected ? def.color + '22' : 'rgba(20,5,40,0.8)';
      ctx.strokeStyle = isSelected ? def.color : (canAfford ? def.color + '66' : '#333344');
    }
    ctx.lineWidth = isSelected ? 2 : 1;
    ctx.fillRect(sx, slotY, slotW, slotH);
    ctx.strokeRect(sx, slotY, slotW, slotH);

    // Tower icon
    ctx.globalAlpha = isLocked ? 0.15 : (canAfford ? 1 : 0.35);
    const iconSize = compact ? 10 : 14;
    const iconX = compact ? sx + slotW / 2 : sx + 28;
    const iconY = compact ? slotY + 20 : slotY + 30;
    drawTowerShape(iconX, iconY, type, isLocked ? '#333344' : def.color, iconSize, gameTime, 1);
    ctx.globalAlpha = 1;

    if (compact) {
      // Compact mode — just name + cost centered
      ctx.font = 'bold 9px monospace';
      ctx.fillStyle = isLocked ? '#333344' : (canAfford ? def.color : '#555566');
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(def.name, sx + slotW / 2, slotY + 38);
      ctx.font = '8px monospace';
      ctx.fillStyle = isLocked ? '#333344' : (canAfford ? '#ffcc00' : '#553300');
      ctx.fillText(isLocked ? '🔒' : def.cost + '¢', sx + slotW / 2, slotY + 49);
      ctx.textAlign = 'left';
    } else {
      // Full mode — name, cost, desc, hotkey
      ctx.font = 'bold 12px monospace';
      ctx.fillStyle = isLocked ? '#333344' : (canAfford ? def.color : '#555566');
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(isLocked ? '🔒 ' + def.name : def.name, sx + 52, slotY + 10);

      ctx.font = '11px monospace';
      if (isLocked) {
        ctx.fillStyle = '#333344';
        ctx.fillText('LOCKED', sx + 52, slotY + 28);
      } else {
        ctx.fillStyle = canAfford ? '#ffcc00' : '#553300';
        ctx.fillText(def.cost + '¢', sx + 52, slotY + 28);
      }

      ctx.font = '10px monospace';
      ctx.fillStyle = isLocked ? '#222233' : (canAfford ? '#888899' : '#333344');
      ctx.fillText(def.desc, sx + 52, slotY + 44);

      ctx.font = '10px monospace';
      ctx.fillStyle = isLocked ? '#222233' : '#666677';
      ctx.fillText('[' + (i + 1) + ']', sx + 52, slotY + 60);
    }
  }
}

let towerSlots = [];

// ─── INPUT HANDLING ──────────────────────────────
let mouseX = 0, mouseY = 0;

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  // Camera hover zones — mouse at top edge → tech tree, bottom edge → battlefield
  if (gamePhase === 'playing') {
    if (mouseY < 30 && camYSmooth < 0.5) {
      camYTarget = 1;
    } else if (mouseY > logicalH - 30 && camYSmooth > 0.5) {
      camYTarget = 0;
    }
  }

  // Grid cell detection (only when in ground view)
  if (camYSmooth < 0.3) {
    const cell = worldToCell(mouseX, mouseY);
    if (cell.col >= 0 && cell.col < COLS && cell.row >= 0 && cell.row < ROWS) {
      hoveredCell = cell;
      const key = cell.col + ',' + cell.row;
      hoveredTower = towers.get(key) || null;
    } else {
      hoveredCell = null;
      hoveredTower = null;
    }
  } else {
    hoveredCell = null;
    hoveredTower = null;
  }

  // Tech tree hover
  hoveredTechNode = null;
});

canvas.addEventListener('click', e => {
  if (gamePhase !== 'playing') return;
  const mx = e.clientX, my = e.clientY;

  // Check speed button
  if (speedBtnBounds) {
    const b = speedBtnBounds;
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      const idx = SPEED_OPTIONS.indexOf(gameSpeed);
      gameSpeed = SPEED_OPTIONS[(idx + 1) % SPEED_OPTIONS.length];
      return;
    }
  }

  // Check auto-wave button
  if (autoWaveBtnBounds) {
    const b = autoWaveBtnBounds;
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      autoWave = !autoWave;
      return;
    }
  }

  // Check mobile camera toggle button
  if (mobileCamBtn) {
    const b = mobileCamBtn;
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      camYTarget = camYTarget > 0.5 ? 0 : 1;
      return;
    }
  }

  // Check next wave button
  if (nextWaveBtn) {
    const b = nextWaveBtn;
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      if (!waveActive) startWave();
      return;
    }
  }

  // Check close button on tower info panel
  if (towerCloseBtn) {
    const b = towerCloseBtn;
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      selectedTowerKey = null;
      return;
    }
  }

  // Check tower upgrade button
  if (towerUpgradeBtn) {
    const b = towerUpgradeBtn;
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      upgradeTower(b.key);
      // keep panel open
      return;
    }
  }
  // Check tower sell button
  if (towerSellBtn) {
    const b = towerSellBtn;
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      sellTower(b.key);
      selectedTowerKey = null;
      return;
    }
  }

  // Check tower slots in panel
  for (const slot of towerSlots) {
    if (mx >= slot.x && mx <= slot.x + slot.w && my >= slot.y && my <= slot.y + slot.h) {
      if (!TOWER_DEFS[slot.type].locked) {
        selectedType = selectedType === slot.type ? null : slot.type;
        selectedTowerKey = null;
      }
      return;
    }
  }

  // Click on grid
  if (hoveredCell) {
    const key = hoveredCell.col + ',' + hoveredCell.row;
    // Click on a tower -> select it
    if (towers.has(key) && !selectedType) {
      selectedTowerKey = selectedTowerKey === key ? null : key;
      return;
    }
    // Place tower
    if (selectedType) {
      placeTower(hoveredCell.col, hoveredCell.row, selectedType);
      return;
    }
  }

  // Click on tech tree nodes (when in sky view)
  if (camYSmooth > 0.5) {
    const H = logicalH;
    const offset = camYSmooth * H;
    const localMouseY = my - offset + H; // convert screen Y to sky-view local Y
    for (const btn of techTreeBtns) {
      if (mx >= btn.x && mx <= btn.x + btn.w && localMouseY >= btn.y && localMouseY <= btn.y + btn.h) {
        unlockTech(btn.tech);
        return;
      }
    }
  }

  // Click on empty area -> deselect everything
  selectedType = null;
  selectedTowerKey = null;
});

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  // Right click on tower -> sell
  if (hoveredTower) {
    sellTower(hoveredTower.col + ',' + hoveredTower.row);
    selectedTowerKey = null;
    hoveredTower = null;
  } else {
    selectedType = null;
    selectedTowerKey = null;
  }
});

document.addEventListener('keydown', e => {
  if (gamePhase !== 'playing') return;
  const types = Object.keys(TOWER_DEFS);
  if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    if (idx < types.length) {
      const type = types[idx];
      if (!TOWER_DEFS[type].locked) {
        selectedType = selectedType === type ? null : type;
      }
    }
  }
  if (e.key === 'Escape') {
    selectedType = null;
    selectedTowerKey = null;
    if (camYTarget > 0) camYTarget = 0;
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    camYTarget = camYTarget > 0.5 ? 0 : 1;
  }
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (!waveActive) startWave();
  }
  // Speed control
  if (e.key === '+' || e.key === '=') {
    const idx = SPEED_OPTIONS.indexOf(gameSpeed);
    gameSpeed = SPEED_OPTIONS[Math.min(idx + 1, SPEED_OPTIONS.length - 1)];
  }
  if (e.key === '-') {
    const idx = SPEED_OPTIONS.indexOf(gameSpeed);
    gameSpeed = SPEED_OPTIONS[Math.max(idx - 1, 0)];
  }
  // Auto-wave toggle
  if (e.key === 'a' || e.key === 'A') {
    autoWave = !autoWave;
  }
});

// ─── GAME LOOP ───────────────────────────────────
function gameLoop(timestamp) {
  if (!lastFrame) lastFrame = timestamp;
  let dt = (timestamp - lastFrame) / 1000;
  lastFrame = timestamp;
  if (dt > 0.1) dt = 0.1; // cap delta time

  if (gamePhase === 'playing') {
    const adjustedDt = dt * gameSpeed;
    update(adjustedDt);
    // Smooth camera
    camYSmooth += (camYTarget - camYSmooth) * Math.min(1, CAM_SPEED * dt);
    if (Math.abs(camYSmooth - camYTarget) < 0.002) camYSmooth = camYTarget;
  }
  try {
  render();
  } catch(e) { console.error('Render error:', e); }
  requestAnimationFrame(gameLoop);
}

// ─── GAME INIT ───────────────────────────────────
function initGame() {
  enemies = [];
  beams = [];
  projectiles = [];
  particles = [];
  towers.clear();
  credits = 250;
  lives = 20;
  score = 0;
  wave = 0;
  waveActive = false;
  waveQueue = [];
  waveTimer = 0;
  selectedType = null;
  hoveredTower = null;
  selectedTowerKey = null;
  gameTime = 0;
  waveBanner = { text:'', alpha:0, timer:0 };
  screenShake = { x:0, y:0, intensity:0 };
  enemyIdCounter = 0;
  camY = 0; camYTarget = 0; camYSmooth = 0;
  techPoints = 0;
  unlockedTech = new Set();
  gameSpeed = 1;
  comboCount = 0;
  comboTimer = 0;
  maxCombo = 0;
  totalKills = 0;
  towersBuilt = 0;
  creditsEarned = 0;
  floatingTexts = [];
  autoWaveTimer = 0;
  // Reset tower locks
  for (const key of Object.keys(TOWER_DEFS)) {
    TOWER_DEFS[key].locked = ['flame','sniper','pulse','void'].includes(key);
  }
}

// ─── EVENT LISTENERS ─────────────────────────────
window.addEventListener('resize', resize);

document.getElementById('startBtn').addEventListener('click', () => {
  initAudio();
  document.getElementById('startScreen').style.display = 'none';
  initGame();
  gamePhase = 'playing';
  waveBanner = { text: 'PLACE TOWERS & START WAVE!', alpha: 1, timer: 3 };
});

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('gameOverScreen').style.display = 'none';
  initGame();
  gamePhase = 'playing';
  waveBanner = { text: 'PLACE TOWERS & START WAVE!', alpha: 1, timer: 3 };
});

// ─── TOUCH / MOBILE SUPPORT ──────────────────────
let isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
let touchStartY = 0;
let touchStartX = 0;
let touchMoved = false;

function getTouchPos(e) {
  const t = e.changedTouches ? e.changedTouches[0] : e.touches[0];
  return { x: t.clientX, y: t.clientY };
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const pos = getTouchPos(e);
  mouseX = pos.x;
  mouseY = pos.y;
  touchStartX = pos.x;
  touchStartY = pos.y;
  touchMoved = false;

  // Update hovered cell for ground view
  if (camYSmooth < 0.3) {
    const cell = worldToCell(mouseX, mouseY);
    if (cell.col >= 0 && cell.col < COLS && cell.row >= 0 && cell.row < ROWS) {
      hoveredCell = cell;
      const key = cell.col + ',' + cell.row;
      hoveredTower = towers.get(key) || null;
    } else {
      hoveredCell = null;
      hoveredTower = null;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const pos = getTouchPos(e);
  mouseX = pos.x;
  mouseY = pos.y;
  const dy = pos.y - touchStartY;
  const dx = pos.x - touchStartX;
  if (Math.abs(dy) > 15 || Math.abs(dx) > 15) touchMoved = true;

  // Swipe up/down for camera
  if (Math.abs(dy) > 50 && Math.abs(dy) > Math.abs(dx) * 1.5) {
    if (dy < -50 && camYSmooth < 0.5) {
      camYTarget = 1; // swipe up → tech tree
    } else if (dy > 50 && camYSmooth > 0.5) {
      camYTarget = 0; // swipe down → battlefield
    }
  }

  // Update hovered cell while dragging on ground
  if (camYSmooth < 0.3 && !touchMoved) {
    const cell = worldToCell(mouseX, mouseY);
    if (cell.col >= 0 && cell.col < COLS && cell.row >= 0 && cell.row < ROWS) {
      hoveredCell = cell;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (touchMoved) return; // was a swipe, not a tap

  const pos = getTouchPos(e);
  mouseX = pos.x;
  mouseY = pos.y;

  if (gamePhase !== 'playing') return;

  // Simulate click — reuse click logic
  const mx = pos.x, my = pos.y;

  // Check speed button
  if (speedBtnBounds) {
    const b = speedBtnBounds;
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      const idx = SPEED_OPTIONS.indexOf(gameSpeed);
      gameSpeed = SPEED_OPTIONS[(idx + 1) % SPEED_OPTIONS.length];
      return;
    }
  }

  // Check auto-wave button
  if (autoWaveBtnBounds) {
    const b = autoWaveBtnBounds;
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      autoWave = !autoWave;
      return;
    }
  }

  // Check mobile camera toggle button
  if (mobileCamBtn) {
    const b = mobileCamBtn;
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      camYTarget = camYTarget > 0.5 ? 0 : 1;
      return;
    }
  }

  // Check next wave button
  if (nextWaveBtn) {
    const b = nextWaveBtn;
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      if (!waveActive) startWave();
      return;
    }
  }

  // Check close button on tower info panel
  if (towerCloseBtn) {
    const b = towerCloseBtn;
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      selectedTowerKey = null;
      return;
    }
  }

  // Check tower upgrade button
  if (towerUpgradeBtn) {
    const b = towerUpgradeBtn;
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      upgradeTower(b.key);
      return;
    }
  }

  // Check tower sell button
  if (towerSellBtn) {
    const b = towerSellBtn;
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      sellTower(b.key);
      selectedTowerKey = null;
      return;
    }
  }

  // Check tower slots in panel
  for (const slot of towerSlots) {
    if (mx >= slot.x && mx <= slot.x + slot.w && my >= slot.y && my <= slot.y + slot.h) {
      if (!TOWER_DEFS[slot.type].locked) {
        selectedType = selectedType === slot.type ? null : slot.type;
        selectedTowerKey = null;
      }
      return;
    }
  }

  // Tap on grid
  if (camYSmooth < 0.3) {
    const cell = worldToCell(mx, my);
    if (cell && cell.col >= 0 && cell.col < COLS && cell.row >= 0 && cell.row < ROWS) {
      const key = cell.col + ',' + cell.row;
      // Tap on a tower -> select it
      if (towers.has(key) && !selectedType) {
        selectedTowerKey = selectedTowerKey === key ? null : key;
        return;
      }
      // Place tower
      if (selectedType) {
        hoveredCell = cell;
        placeTower(cell.col, cell.row, selectedType);
        return;
      }
    }
  }

  // Tap on tech tree nodes (when in sky view)
  if (camYSmooth > 0.5) {
    const H = logicalH;
    const offset = camYSmooth * H;
    const localMouseY = my - offset + H;
    for (const btn of techTreeBtns) {
      if (mx >= btn.x && mx <= btn.x + btn.w && localMouseY >= btn.y && localMouseY <= btn.y + btn.h) {
        unlockTech(btn.tech);
        return;
      }
    }
  }

  // Tap on empty area -> deselect
  selectedType = null;
  selectedTowerKey = null;
}, { passive: false });

// Prevent default on document level for mobile
document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });

// Mobile camera toggle button state
let mobileCamBtn = null;

// ─── START ───────────────────────────────────────
resize();
generatePath();
requestAnimationFrame(gameLoop);

</script>
