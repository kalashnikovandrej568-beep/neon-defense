<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON DEFENSE — Retrowave Tower Defense</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0014;overflow:hidden;font-family:'Segoe UI',monospace;cursor:crosshair;user-select:none;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none}
canvas{display:block}
#startScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:linear-gradient(180deg,#0a0014 0%,#1a0030 40%,#2a0040 70%,#0a0014 100%)}
#startScreen h1{font-size:clamp(36px,8vw,90px);color:#ff00ff;text-shadow:0 0 20px #ff00ff,0 0 60px #ff00ff,0 0 120px #ff006688;letter-spacing:8px;margin-bottom:10px;animation:titlePulse 3s ease-in-out infinite}
#startScreen h2{font-size:clamp(14px,3vw,28px);color:#00ffff;text-shadow:0 0 15px #00ffff,0 0 40px #00ffff;letter-spacing:12px;margin-bottom:60px;text-transform:uppercase}
#startScreen .start-btn{font-size:clamp(16px,3vw,24px);color:#ffcc00;text-shadow:0 0 15px #ffcc00,0 0 30px #ffcc00;letter-spacing:6px;animation:blink 1.5s ease-in-out infinite;cursor:pointer;background:none;border:2px solid #ffcc0066;padding:15px 50px;text-transform:uppercase;font-family:inherit;transition:all .3s}
#startScreen .start-btn:hover{border-color:#ffcc00;background:#ffcc0011;box-shadow:0 0 30px #ffcc0044}
@keyframes titlePulse{0%,100%{text-shadow:0 0 20px #ff00ff,0 0 60px #ff00ff,0 0 120px #ff006688}50%{text-shadow:0 0 30px #ff00ff,0 0 80px #ff00ff,0 0 160px #ff0066aa}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
#gameOverScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(10,0,20,.92)}
#gameOverScreen h1{font-size:60px;color:#ff0044;text-shadow:0 0 30px #ff0044,0 0 80px #ff0044;margin-bottom:20px}
#gameOverScreen .final-score{font-size:30px;color:#ffcc00;text-shadow:0 0 20px #ffcc00;margin-bottom:10px}
#gameOverScreen .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 30px;margin-bottom:30px;text-align:center}
#gameOverScreen .stat-item{font-size:16px;color:#aaccee;text-shadow:0 0 8px #4466aa}
#gameOverScreen .stat-value{font-size:22px;color:#00ffcc;text-shadow:0 0 12px #00ffcc;font-weight:bold}
#gameOverScreen .stat-label{font-size:11px;color:#667788;text-transform:uppercase;letter-spacing:2px}
#gameOverScreen .high-score{font-size:18px;color:#ff00ff;text-shadow:0 0 15px #ff00ff;margin-bottom:25px}
#gameOverScreen .new-record{color:#ffcc00;animation:blink 0.5s ease-in-out infinite;font-size:20px;margin-bottom:5px}
#gameOverScreen .start-btn{font-size:20px;color:#00ffff;text-shadow:0 0 15px #00ffff;cursor:pointer;background:none;border:2px solid #00ffff66;padding:12px 40px;font-family:inherit;letter-spacing:4px;transition:all .3s}
#gameOverScreen .start-btn:hover{border-color:#00ffff;background:#00ffff11;box-shadow:0 0 30px #00ffff44}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="startScreen">
  <h1>NEON DEFENSE</h1>
  <h2>Retrowave Tower Defense</h2>
  <button class="start-btn" id="startBtn">▶ START GAME ◀</button>
</div>
<div id="gameOverScreen">
  <h1>GAME OVER</h1>
  <div class="final-score" id="finalScore">SCORE: 0</div>
  <div id="newRecordBanner" class="new-record" style="display:none">★ NEW RECORD! ★</div>
  <div class="high-score" id="highScoreDisplay">BEST: 0</div>
  <div class="stats-grid" id="statsGrid">
    <div class="stat-item"><div class="stat-value" id="statWave">0</div><div class="stat-label">Wave</div></div>
    <div class="stat-item"><div class="stat-value" id="statKills">0</div><div class="stat-label">Kills</div></div>
    <div class="stat-item"><div class="stat-value" id="statCombo">0</div><div class="stat-label">Max Combo</div></div>
    <div class="stat-item"><div class="stat-value" id="statTowers">0</div><div class="stat-label">Towers Built</div></div>
  </div>
  <button class="start-btn" id="restartBtn">▶ PLAY AGAIN ◀</button>
</div>

<script>
// ═══════════════════════════════════════════════════
//  NEON DEFENSE — Retrowave Tower Defense Simulator
// ═══════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ─── CONFIG ──────────────────────────────────────
const COLS = 20, ROWS = 12;
const PANEL_H = 110;
const BPM = 100;

const WAYPOINTS = [
  [-1,6],[2,6],[2,2],[6,2],[6,9],[10,9],[10,3],[14,3],[14,10],[18,10],[18,6],[20,6]
];

const TOWER_DEFS = {
  laser:  { name:'LASER',  cost:50,  range:3,   dmg:15,  rate:0.4,  color:'#00ffff', desc:'Fast beam',   locked:false },
  plasma: { name:'PLASMA', cost:100, range:2.5, dmg:45,  rate:1.2,  color:'#ff00ff', desc:'AoE splash',  locked:false },
  tesla:  { name:'TESLA',  cost:150, range:3.5, dmg:20,  rate:0.8,  color:'#aa44ff', desc:'Chain zap',   locked:false },
  cryo:   { name:'CRYO',   cost:75,  range:2.8, dmg:8,   rate:0.6,  color:'#4488ff', desc:'Slow enemy',  locked:false },
  flame:  { name:'FLAME',  cost:120, range:2,   dmg:35,  rate:0.3,  color:'#ff6600', desc:'Burn area',   locked:true },
  sniper: { name:'SNIPER', cost:200, range:5,   dmg:120, rate:2.5,  color:'#88ff44', desc:'Long range',  locked:true },
  pulse:  { name:'PULSE',  cost:180, range:3,   dmg:30,  rate:1.0,  color:'#ff44aa', desc:'Push back',   locked:true },
  void:   { name:'VOID',   cost:300, range:2.5, dmg:60,  rate:1.5,  color:'#aa00ff', desc:'% HP dmg',    locked:true }
};

// ─── TECH TREE ───────────────────────────────────
const TECH_TREE = [
  { id:'flame',  name:'FLAME TOWER',  unlocks:'flame',  cost:100, requires:null,    col:0, row:0, color:'#ff6600', desc:'Unlocks Flame Tower — burns enemies in area' },
  { id:'sniper', name:'SNIPER TOWER', unlocks:'sniper', cost:150, requires:null,    col:1, row:0, color:'#88ff44', desc:'Unlocks Sniper Tower — extreme range, high damage' },
  { id:'pulse',  name:'PULSE TOWER',  unlocks:'pulse',  cost:200, requires:'flame', col:0, row:1, color:'#ff44aa', desc:'Unlocks Pulse Tower — pushes enemies back' },
  { id:'void',   name:'VOID TOWER',   unlocks:'void',   cost:300, requires:'sniper',col:1, row:1, color:'#aa00ff', desc:'Unlocks Void Tower — deals % of max HP' },
  { id:'dmg1',   name:'DAMAGE +20%',  unlocks:null,     cost:80,  requires:null,    col:2, row:0, color:'#ffcc00', desc:'All towers deal 20% more damage' },
  { id:'range1', name:'RANGE +15%',   unlocks:null,     cost:80,  requires:null,    col:3, row:0, color:'#00ffcc', desc:'All towers get 15% more range' },
  { id:'dmg2',   name:'DAMAGE +30%',  unlocks:null,     cost:200, requires:'dmg1',  col:2, row:1, color:'#ffdd44', desc:'All towers deal 30% more damage' },
  { id:'rate1',  name:'FIRE RATE +20%',unlocks:null,     cost:200, requires:'range1',col:3, row:1, color:'#44ffcc', desc:'All towers fire 20% faster' }
];
let unlockedTech = new Set();
let techPoints = 0; // earned per wave

const ENEMY_DEFS = {
  drone:   { hp:40,   speed:2.2, reward:10, color:'#00ffcc', size:0.28, shape:'diamond' },
  walker:  { hp:100,  speed:1.2, reward:20, color:'#ff8800', size:0.35, shape:'square' },
  phantom: { hp:60,   speed:2.8, reward:30, color:'#8844ff', size:0.3,  shape:'triangle', stealth:true },
  heavy:   { hp:300,  speed:0.6, reward:50, color:'#ff2244', size:0.45, shape:'pentagon' },
  boss:    { hp:1200, speed:0.35,reward:200,color:'#ffcc00', size:0.6,  shape:'octagon' }
};

// ─── MUSIC DATA ──────────────────────────────────
const CHORD_FREQS = [
  [220.00, 261.63, 329.63],     // Am
  [174.61, 220.00, 261.63],     // F
  [261.63, 329.63, 392.00],     // C
  [196.00, 246.94, 293.66]      // G
];
const ARP_FREQS = [
  [220,261.63,329.63,440],
  [174.61,220,261.63,349.23],
  [261.63,329.63,392,523.25],
  [196,246.94,293.66,392]
];
const BASS_FREQS = [110, 87.31, 130.81, 98];

// ─── GAME STATE ──────────────────────────────────
let cellSize, gridX, gridY, gridW, gridH;
let pathCells = [];
let pathSet = new Set();
let towers = new Map();
let enemies = [];
let beams = [];
let projectiles = [];
let particles = [];
let flowDots = [];
let ambientParticles = [];

let credits = 250, lives = 20, score = 0;
let wave = 0, waveActive = false, waveTimer = 0;
let waveQueue = [];
let spawnTimer = 0;
let selectedType = null;
let hoveredCell = null;
let hoveredTower = null;
let selectedTowerKey = null; // clicked tower stays selected
let gamePhase = 'menu';
let gameTime = 0;
let lastFrame = 0;
let waveBanner = { text:'', alpha:0, timer:0 };
let stars = [];
let mountainPoints = [];
let screenShake = { x:0, y:0, intensity:0 };

// ─── GAME SPEED ──────────────────────────────────
let gameSpeed = 1; // 1x, 2x, 3x
const SPEED_OPTIONS = [1, 2, 3];
let speedBtnBounds = null;

// ─── COMBO SYSTEM ────────────────────────────────
let comboCount = 0;
let comboTimer = 0;
const COMBO_TIMEOUT = 2.0; // seconds to maintain combo
let maxCombo = 0;
let totalKills = 0;
let towersBuilt = 0;
let creditsEarned = 0;

// ─── FLOATING TEXT ───────────────────────────────
let floatingTexts = [];

function spawnFloatingText(x, y, text, color, size) {
  floatingTexts.push({
    x, y, text, color,
    size: size || 14,
    life: 1.2,
    maxLife: 1.2,
    vy: -40
  });
}

// ─── HIGH SCORE ──────────────────────────────────
let highScore = 0;
let highWave = 0;
try {
  highScore = parseInt(localStorage.getItem('neonDefenseHighScore')) || 0;
  highWave = parseInt(localStorage.getItem('neonDefenseHighWave')) || 0;
} catch(e) {}

function saveHighScore() {
  try {
    if (score > highScore) { highScore = score; localStorage.setItem('neonDefenseHighScore', score); }
    if (wave > highWave) { highWave = wave; localStorage.setItem('neonDefenseHighWave', wave); }
  } catch(e) {}
}

// ─── AUTO-WAVE ───────────────────────────────────
let autoWave = false;
let autoWaveTimer = 0;
const AUTO_WAVE_DELAY = 3; // seconds after wave clear
let autoWaveBtnBounds = null;

// Camera system
let camY = 0;        // 0 = game view (ground), 1 = sky view (tech tree)
let camYTarget = 0;
let camYSmooth = 0;  // interpolated
const CAM_SPEED = 3; // interpolation speed

// Audio
let ac, masterGain, reverbNode, reverbGain;
let delayNode, delayFB, padGain, padFilter, padLFO, padLFOGain;
let arpFilter, bassFilter, drumGain;
let padOscs = [];
let musicPlaying = false;
let nextBarTime = 0, barIndex = 0;
let musicStarted = false;

// ─── INIT & RESIZE ──────────────────────────────
let dpr = 1; // device pixel ratio
let logicalW = 800, logicalH = 600;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2); // cap at 2x for performance
  logicalW = window.innerWidth;
  logicalH = window.innerHeight;
  canvas.width = logicalW * dpr;
  canvas.height = logicalH * dpr;
  canvas.style.width = logicalW + 'px';
  canvas.style.height = logicalH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const playH = logicalH - PANEL_H;
  cellSize = Math.min(logicalW / COLS, playH / ROWS);
  gridW = cellSize * COLS;
  gridH = cellSize * ROWS;
  gridX = (logicalW - gridW) / 2;
  gridY = (playH - gridH) / 2;
  generateStars();
  generateMountains();
}

function generateStars() {
  stars = [];
  for (let i = 0; i < 100; i++) {
    stars.push({
      x: Math.random() * logicalW,
      y: Math.random() * logicalH * 0.45,
      size: Math.random() * 2 + 0.5,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 2 + 1
    });
  }
}

function generateMountains() {
  mountainPoints = [];
  const w = logicalW;
  const baseY = logicalH * 0.32;
  for (let x = 0; x <= w; x += 15) {
    const h1 = Math.sin(x * 0.008) * 40 + Math.sin(x * 0.015) * 25 + Math.sin(x * 0.003) * 60;
    const h2 = Math.sin(x * 0.012 + 1) * 30 + Math.sin(x * 0.006 + 2) * 50;
    mountainPoints.push({ x, y1: baseY - h1 - 30, y2: baseY - h2 });
  }
}

function generatePath() {
  pathCells = [];
  pathSet.clear();
  for (let i = 0; i < WAYPOINTS.length - 1; i++) {
    const [x1, y1] = WAYPOINTS[i];
    const [x2, y2] = WAYPOINTS[i + 1];
    const dx = Math.sign(x2 - x1);
    const dy = Math.sign(y2 - y1);
    let x = x1, y = y1;
    while (x !== x2 || y !== y2) {
      if (x >= 0 && x < COLS && y >= 0 && y < ROWS) {
        const key = x + ',' + y;
        if (!pathSet.has(key)) {
          pathCells.push([x, y]);
          pathSet.add(key);
        }
      }
      if (x !== x2) x += dx;
      else if (y !== y2) y += dy;
    }
  }
  const [lx, ly] = WAYPOINTS[WAYPOINTS.length - 1];
  if (lx >= 0 && lx < COLS && ly >= 0 && ly < ROWS) {
    const key = lx + ',' + ly;
    if (!pathSet.has(key)) { pathCells.push([lx, ly]); pathSet.add(key); }
  }
  // Generate full path including off-screen for enemy movement
  generateFullPath();
  // Flow dots
  flowDots = [];
  for (let i = 0; i < 15; i++) {
    flowDots.push({ progress: i / 15 * fullPath.length, speed: 3 + Math.random() * 2 });
  }
  // Ambient particles
  ambientParticles = [];
  for (let i = 0; i < 20; i++) {
    ambientParticles.push({
      x: Math.random() * logicalW,
      y: Math.random() * logicalH,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -Math.random() * 0.5 - 0.1,
      size: Math.random() * 3 + 1,
      alpha: Math.random() * 0.3,
      hue: Math.random() * 60 + 280
    });
  }
}

let fullPath = [];
function generateFullPath() {
  fullPath = [];
  for (let i = 0; i < WAYPOINTS.length - 1; i++) {
    const [x1, y1] = WAYPOINTS[i];
    const [x2, y2] = WAYPOINTS[i + 1];
    const dx = Math.sign(x2 - x1);
    const dy = Math.sign(y2 - y1);
    let x = x1, y = y1;
    while (x !== x2 || y !== y2) {
      if (fullPath.length === 0 || fullPath[fullPath.length-1][0] !== x || fullPath[fullPath.length-1][1] !== y) {
        fullPath.push([x, y]);
      }
      if (x !== x2) x += dx;
      else if (y !== y2) y += dy;
    }
  }
  const [lx, ly] = WAYPOINTS[WAYPOINTS.length - 1];
  fullPath.push([lx, ly]);
}

function cellToWorld(col, row) {
  return {
    x: gridX + (col + 0.5) * cellSize,
    y: gridY + (row + 0.5) * cellSize
  };
}

function worldToCell(wx, wy) {
  const offset = camYSmooth * logicalH;
  const col = Math.floor((wx - gridX) / cellSize);
  const row = Math.floor((wy - offset - gridY) / cellSize);
  return { col, row };
}

function getPathPosition(progress) {
  const idx = Math.floor(progress);
  const frac = progress - idx;
  if (idx >= fullPath.length - 1) {
    const [x, y] = fullPath[fullPath.length - 1];
    return cellToWorld(x, y);
  }
  if (idx < 0) {
    const [x, y] = fullPath[0];
    return cellToWorld(x, y);
  }
  const [x1, y1] = fullPath[idx];
  const [x2, y2] = fullPath[Math.min(idx + 1, fullPath.length - 1)];
  return {
    x: gridX + (x1 + (x2 - x1) * frac + 0.5) * cellSize,
    y: gridY + (y1 + (y2 - y1) * frac + 0.5) * cellSize
  };
}

// ─── AUDIO ENGINE ────────────────────────────────
function initAudio() {
  if (musicStarted) return;
  musicStarted = true;
  ac = new (window.AudioContext || window.webkitAudioContext)();
  if (ac.state === 'suspended') ac.resume();

  // Master
  masterGain = ac.createGain();
  masterGain.gain.value = 0.45;
  masterGain.connect(ac.destination);

  // Compressor
  const comp = ac.createDynamicsCompressor();
  comp.threshold.value = -20;
  comp.ratio.value = 4;
  comp.connect(masterGain);

  // Reverb
  reverbNode = createReverb(3, 2.5);
  reverbGain = ac.createGain();
  reverbGain.gain.value = 0.25;
  reverbNode.connect(reverbGain);
  reverbGain.connect(comp);

  // Delay for arp
  delayNode = ac.createDelay(2);
  delayNode.delayTime.value = 60 / BPM * 0.75;
  delayFB = ac.createGain();
  delayFB.gain.value = 0.3;
  delayNode.connect(delayFB);
  delayFB.connect(delayNode);
  delayNode.connect(reverbGain);
  const delayDry = ac.createGain();
  delayDry.gain.value = 0.4;
  delayNode.connect(delayDry);
  delayDry.connect(comp);

  // Pad bus
  padFilter = ac.createBiquadFilter();
  padFilter.type = 'lowpass';
  padFilter.frequency.value = 700;
  padFilter.Q.value = 1.5;
  padGain = ac.createGain();
  padGain.gain.value = 0;
  padGain.connect(padFilter);
  padFilter.connect(comp);
  padFilter.connect(reverbNode);

  // Pad LFO
  padLFO = ac.createOscillator();
  padLFO.type = 'sine';
  padLFO.frequency.value = 0.12;
  padLFOGain = ac.createGain();
  padLFOGain.gain.value = 250;
  padLFO.connect(padLFOGain);
  padLFOGain.connect(padFilter.frequency);
  padLFO.start();

  // Arp filter
  arpFilter = ac.createBiquadFilter();
  arpFilter.type = 'lowpass';
  arpFilter.frequency.value = 2000;
  arpFilter.Q.value = 3;
  arpFilter.connect(comp);
  arpFilter.connect(delayNode);

  // Bass filter
  bassFilter = ac.createBiquadFilter();
  bassFilter.type = 'lowpass';
  bassFilter.frequency.value = 280;
  bassFilter.Q.value = 0.7;
  bassFilter.connect(comp);

  // Drum bus
  drumGain = ac.createGain();
  drumGain.gain.value = 0.55;
  drumGain.connect(comp);

  // Create pad oscillators (2 per note × 3 notes = 6)
  const chord = CHORD_FREQS[0];
  for (let i = 0; i < 3; i++) {
    const o1 = ac.createOscillator();
    o1.type = 'sawtooth';
    o1.frequency.value = chord[i];
    o1.detune.value = -8;
    o1.connect(padGain);
    o1.start();
    const o2 = ac.createOscillator();
    o2.type = 'sawtooth';
    o2.frequency.value = chord[i];
    o2.detune.value = 8;
    o2.connect(padGain);
    o2.start();
    padOscs.push(o1, o2);
  }

  // Fade in pad
  padGain.gain.setValueAtTime(0, ac.currentTime);
  padGain.gain.linearRampToValueAtTime(0.055, ac.currentTime + 2);

  nextBarTime = ac.currentTime + 0.2;
  barIndex = 0;
  musicPlaying = true;
  schedulerLoop();
}

function createReverb(duration, decay) {
  const len = ac.sampleRate * duration;
  const buf = ac.createBuffer(2, len, ac.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
    }
  }
  const conv = ac.createConvolver();
  conv.buffer = buf;
  return conv;
}

function schedulerLoop() {
  if (!musicPlaying) return;
  while (nextBarTime < ac.currentTime + 0.6) {
    const ci = barIndex % 4;
    scheduleChord(nextBarTime, ci);
    scheduleArp(nextBarTime, ci);
    scheduleBass(nextBarTime, ci);
    scheduleDrums(nextBarTime);
    nextBarTime += 60 / BPM * 4;
    barIndex++;
  }
  setTimeout(schedulerLoop, 120);
}

function scheduleChord(time, ci) {
  const ch = CHORD_FREQS[ci];
  for (let i = 0; i < 3; i++) {
    padOscs[i * 2].frequency.setTargetAtTime(ch[i], time, 0.15);
    padOscs[i * 2 + 1].frequency.setTargetAtTime(ch[i], time, 0.15);
  }
}

function scheduleArp(barTime, ci) {
  const notes = ARP_FREQS[ci];
  const pat = [0,1,2,3,2,1,0,1,2,3,3,2,1,0,1,2];
  const sixteenth = 60 / BPM / 4;
  for (let i = 0; i < 16; i++) {
    playArpNote(barTime + i * sixteenth, notes[pat[i]], sixteenth);
  }
}

function playArpNote(time, freq, dur) {
  const osc = ac.createOscillator();
  osc.type = 'square';
  osc.frequency.value = freq;
  const g = ac.createGain();
  g.gain.setValueAtTime(0, time);
  g.gain.linearRampToValueAtTime(0.04, time + 0.008);
  g.gain.setTargetAtTime(0.02, time + 0.008, 0.08);
  g.gain.setTargetAtTime(0.0001, time + dur * 0.7, 0.05);
  osc.connect(g);
  g.connect(arpFilter);
  osc.start(time);
  osc.stop(time + dur * 0.95);
}

function scheduleBass(barTime, ci) {
  const freq = BASS_FREQS[ci];
  const eighth = 60 / BPM / 2;
  const pattern = [1,0,1,1,0,1,0,1];
  for (let i = 0; i < 8; i++) {
    if (!pattern[i]) continue;
    const t = barTime + i * eighth;
    const osc = ac.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.09, t + 0.01);
    g.gain.setTargetAtTime(0.0001, t + eighth * 0.6, 0.08);
    osc.connect(g);
    g.connect(bassFilter);
    osc.start(t);
    osc.stop(t + eighth * 0.9);
  }
}

function scheduleDrums(barTime) {
  const beat = 60 / BPM;
  // Kick
  [0, 2].forEach(b => playKick(barTime + b * beat));
  // Snare
  [1, 3].forEach(b => playSnare(barTime + b * beat));
  // Hihat
  for (let i = 0; i < 8; i++) {
    const open = (i === 3 || i === 7);
    playHihat(barTime + i * beat / 2, open);
  }
}

function playKick(time) {
  const osc = ac.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, time);
  osc.frequency.exponentialRampToValueAtTime(35, time + 0.12);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.6, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.35);
  osc.connect(g);
  g.connect(drumGain);
  osc.start(time);
  osc.stop(time + 0.4);
}

function playSnare(time) {
  // Noise
  const bufLen = ac.sampleRate * 0.15;
  const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) d[i] = Math.random() * 2 - 1;
  const noise = ac.createBufferSource();
  noise.buffer = buf;
  const nf = ac.createBiquadFilter();
  nf.type = 'bandpass';
  nf.frequency.value = 3000;
  nf.Q.value = 0.8;
  const ng = ac.createGain();
  ng.gain.setValueAtTime(0.25, time);
  ng.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
  noise.connect(nf);
  nf.connect(ng);
  ng.connect(drumGain);
  noise.start(time);
  noise.stop(time + 0.2);
  // Body
  const osc = ac.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 180;
  const og = ac.createGain();
  og.gain.setValueAtTime(0.3, time);
  og.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
  osc.connect(og);
  og.connect(drumGain);
  osc.start(time);
  osc.stop(time + 0.12);
}

function playHihat(time, open) {
  const bufLen = ac.sampleRate * (open ? 0.15 : 0.04);
  const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource();
  src.buffer = buf;
  const hf = ac.createBiquadFilter();
  hf.type = 'highpass';
  hf.frequency.value = 7000;
  const g = ac.createGain();
  g.gain.setValueAtTime(open ? 0.08 : 0.06, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + (open ? 0.15 : 0.04));
  src.connect(hf);
  hf.connect(g);
  g.connect(drumGain);
  src.start(time);
  src.stop(time + (open ? 0.2 : 0.06));
}

// SFX
function playSfx(type) {
  if (!ac) return;
  const now = ac.currentTime;
  if (type === 'place') {
    const o = ac.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(600, now);
    o.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.15, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    o.connect(g); g.connect(masterGain);
    o.start(now); o.stop(now + 0.2);
  } else if (type === 'sell') {
    const o = ac.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(800, now);
    o.frequency.exponentialRampToValueAtTime(300, now + 0.12);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.12, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    o.connect(g); g.connect(masterGain);
    o.start(now); o.stop(now + 0.2);
  } else if (type === 'hit') {
    const o = ac.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(200, now);
    o.frequency.exponentialRampToValueAtTime(80, now + 0.06);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.06, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    o.connect(g); g.connect(masterGain);
    o.start(now); o.stop(now + 0.1);
  } else if (type === 'explode') {
    const bufLen = ac.sampleRate * 0.3;
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/bufLen, 1.5);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const f = ac.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 600;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.15, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    src.connect(f); f.connect(g); g.connect(masterGain);
    src.start(now); src.stop(now + 0.35);
  } else if (type === 'wave') {
    [400, 600, 800].forEach((f, i) => {
      const o = ac.createOscillator();
      o.type = 'sine'; o.frequency.value = f;
      const g = ac.createGain();
      g.gain.setValueAtTime(0, now + i * 0.08);
      g.gain.linearRampToValueAtTime(0.08, now + i * 0.08 + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.2);
      o.connect(g); g.connect(masterGain);
      o.start(now + i * 0.08); o.stop(now + i * 0.08 + 0.25);
    });
  }
}

// ─── PARTICLE SYSTEM ─────────────────────────────
function spawnParticles(x, y, color, count, speed, life) {
  if (particles.length > 300) return; // Cap particles for performance
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed + speed * 0.3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: life * (0.5 + Math.random() * 0.5),
      maxLife: life,
      color,
      size: Math.random() * 3 + 1.5
    });
  }
}

function spawnExplosion(x, y, color, big) {
  const n = big ? 20 : 10;
  spawnParticles(x, y, color, n, big ? 150 : 80, big ? 0.6 : 0.4);
  spawnParticles(x, y, '#ffffff', Math.floor(n/4), big ? 100 : 60, 0.25);
  screenShake.intensity = big ? 4 : 2;
  if (big) playSfx('explode');
}

// ─── TOWER LOGIC ─────────────────────────────────
function createTower(col, row, type) {
  const def = TOWER_DEFS[type];
  return {
    col, row, type,
    x: gridX + (col + 0.5) * cellSize,
    y: gridY + (row + 0.5) * cellSize,
    range: def.range * cellSize,
    dmg: def.dmg,
    rate: def.rate,
    color: def.color,
    cooldown: 0,
    angle: 0,
    kills: 0,
    level: 1,
    pulseTime: 0
  };
}

function placeTower(col, row, type) {
  const def = TOWER_DEFS[type];
  if (def.locked) return false;
  if (credits < def.cost) return false;
  const key = col + ',' + row;
  if (towers.has(key) || pathSet.has(key)) return false;
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
  credits -= def.cost;
  const tower = createTower(col, row, type);
  // Apply tech bonuses
  tower.dmg *= getTechDmgMultiplier();
  tower.range *= getTechRangeMultiplier();
  tower.rate *= getTechRateMultiplier();
  towers.set(key, tower);
  towersBuilt++;
  playSfx('place');
  spawnFloatingText(
    gridX + (col + 0.5) * cellSize,
    gridY + (row + 0.5) * cellSize - 20,
    '-' + def.cost + '\u00A2', '#ff6644', 13
  );
  spawnParticles(
    gridX + (col + 0.5) * cellSize,
    gridY + (row + 0.5) * cellSize,
    def.color, 6, 60, 0.3
  );
  return true;
}

function sellTower(key) {
  const t = towers.get(key);
  if (!t) return;
  const refund = Math.floor(TOWER_DEFS[t.type].cost * 0.5 * t.level);
  credits += refund;
  spawnFloatingText(t.x, t.y - 15, '+' + refund + '\u00A2', '#ffcc00', 16);
  spawnParticles(t.x, t.y, '#ffcc00', 5, 50, 0.3);
  towers.delete(key);
  playSfx('sell');
}

function upgradeTower(key) {
  const t = towers.get(key);
  if (!t || t.level >= 3) return;
  const cost = Math.floor(TOWER_DEFS[t.type].cost * (t.level * 0.7));
  if (credits < cost) return;
  credits -= cost;
  t.level++;
  t.dmg = Math.floor(TOWER_DEFS[t.type].dmg * (1 + (t.level - 1) * 0.5));
  t.range = TOWER_DEFS[t.type].range * cellSize * (1 + (t.level - 1) * 0.1);
  t.rate = TOWER_DEFS[t.type].rate * Math.pow(0.85, t.level - 1);
  spawnParticles(t.x, t.y, '#ffffff', 8, 80, 0.4);
  playSfx('place');
}

function findTarget(tower) {
  let best = null, bestProgress = -1;
  for (const e of enemies) {
    if (e.dead) continue;
    const dx = e.x - tower.x, dy = e.y - tower.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    // Stealth enemies have reduced detection range (except tesla & cryo reveal them, or STEALTH SCAN tech)
    let effectiveRange = tower.range;
    if (e.stealth && tower.type !== 'tesla' && tower.type !== 'cryo' && !unlockedTech.has('reveal')) {
      effectiveRange *= 0.6;
    }
    if (dist <= effectiveRange && e.pathProgress > bestProgress) {
      best = e;
      bestProgress = e.pathProgress;
    }
  }
  return best;
}

function towerShoot(tower, target, dt) {
  tower.cooldown -= dt;
  if (tower.cooldown > 0) return;
  tower.cooldown = tower.rate;
  tower.pulseTime = 0.15;
  
  const dx = target.x - tower.x, dy = target.y - tower.y;
  tower.angle = Math.atan2(dy, dx);

  if (tower.type === 'laser') {
    beams.push({
      x1: tower.x, y1: tower.y, x2: target.x, y2: target.y,
      color: tower.color, life: 0.1, maxLife: 0.1, width: 2 + tower.level
    });
    dealDamage(target, tower.dmg, 'laser');
    // Multishot tech: hit 1 extra target
    if (unlockedTech.has('multi')) {
      let extra = null, extraDist = tower.range;
      for (const e of enemies) {
        if (e.dead || e.id === target.id) continue;
        const d = Math.hypot(e.x - tower.x, e.y - tower.y);
        if (d < extraDist) { extra = e; extraDist = d; }
      }
      if (extra) {
        beams.push({ x1: tower.x, y1: tower.y, x2: extra.x, y2: extra.y, color: tower.color + '88', life: 0.08, maxLife: 0.08, width: 1 + tower.level });
        dealDamage(extra, Math.floor(tower.dmg * 0.5), 'laser');
      }
    }
  } else if (tower.type === 'plasma') {
    projectiles.push({
      x: tower.x, y: tower.y,
      tx: target.x, ty: target.y,
      targetId: target.id,
      speed: 350,
      dmg: tower.dmg,
      splash: cellSize * 1.5,
      color: tower.color,
      size: 5 + tower.level * 2,
      trail: []
    });
  } else if (tower.type === 'tesla') {
    dealDamage(target, tower.dmg, 'tesla');
    beams.push({
      x1: tower.x, y1: tower.y, x2: target.x, y2: target.y,
      color: tower.color, life: 0.12, maxLife: 0.12, width: 2, tesla: true
    });
    // Chain to nearby enemies
    let chains = tower.level;
    let lastX = target.x, lastY = target.y;
    const hit = new Set([target.id]);
    for (let c = 0; c < chains; c++) {
      let closest = null, closestDist = cellSize * 2.5;
      for (const e of enemies) {
        if (e.dead || hit.has(e.id)) continue;
        const d = Math.hypot(e.x - lastX, e.y - lastY);
        if (d < closestDist) { closest = e; closestDist = d; }
      }
      if (!closest) break;
      hit.add(closest.id);
      dealDamage(closest, Math.floor(tower.dmg * 0.6), 'tesla');
      beams.push({
        x1: lastX, y1: lastY, x2: closest.x, y2: closest.y,
        color: '#cc88ff', life: 0.1, maxLife: 0.1, width: 1.5, tesla: true
      });
      lastX = closest.x; lastY = closest.y;
    }
  } else if (tower.type === 'cryo') {
    beams.push({
      x1: tower.x, y1: tower.y, x2: target.x, y2: target.y,
      color: tower.color, life: 0.08, maxLife: 0.08, width: 3 + tower.level, cryo: true
    });
    dealDamage(target, tower.dmg, 'cryo');
    target.slowTimer = 2;
    target.slowFactor = 0.4;
    spawnParticles(target.x, target.y, '#88ccff', 3, 30, 0.3);
  } else if (tower.type === 'flame') {
    // Area burn — damages all enemies in range
    for (const e of enemies) {
      if (e.dead) continue;
      const d = Math.hypot(e.x - tower.x, e.y - tower.y);
      if (d <= tower.range) {
        dealDamage(e, tower.dmg, 'flame');
        spawnParticles(e.x, e.y, '#ff6600', 2, 40, 0.2);
      }
    }
    // Flame burst beam visual
    beams.push({
      x1: tower.x, y1: tower.y, x2: target.x, y2: target.y,
      color: '#ff6600', life: 0.12, maxLife: 0.12, width: 4 + tower.level
    });
    spawnParticles(tower.x, tower.y, '#ffaa00', 4, 60, 0.3);
  } else if (tower.type === 'sniper') {
    // High damage single target
    dealDamage(target, tower.dmg, 'sniper');
    beams.push({
      x1: tower.x, y1: tower.y, x2: target.x, y2: target.y,
      color: '#88ff44', life: 0.15, maxLife: 0.15, width: 1.5
    });
    spawnParticles(target.x, target.y, '#88ff44', 5, 70, 0.3);
    // Multishot tech: hit 1 extra target
    if (unlockedTech.has('multi')) {
      let extra = null, extraDist = tower.range;
      for (const e of enemies) {
        if (e.dead || e.id === target.id) continue;
        const d = Math.hypot(e.x - tower.x, e.y - tower.y);
        if (d < extraDist) { extra = e; extraDist = d; }
      }
      if (extra) {
        beams.push({ x1: tower.x, y1: tower.y, x2: extra.x, y2: extra.y, color: '#88ff4488', life: 0.12, maxLife: 0.12, width: 1 });
        dealDamage(extra, Math.floor(tower.dmg * 0.5), 'sniper');
      }
    }
  } else if (tower.type === 'pulse') {
    // Push back + damage all in range
    for (const e of enemies) {
      if (e.dead) continue;
      const d = Math.hypot(e.x - tower.x, e.y - tower.y);
      if (d <= tower.range) {
        dealDamage(e, tower.dmg, 'pulse');
        // Push enemy back along path
        e.pathProgress = Math.max(0, e.pathProgress - 0.03 * (1 + tower.level * 0.3));
        spawnParticles(e.x, e.y, '#ff44aa', 2, 50, 0.25);
      }
    }
    spawnParticles(tower.x, tower.y, '#ff44aa', 6, 80, 0.35);
  } else if (tower.type === 'void') {
    // % HP damage
    const pctDmg = Math.max(tower.dmg, Math.floor(target.maxHp * (0.04 + tower.level * 0.02)));
    dealDamage(target, pctDmg, 'void');
    beams.push({
      x1: tower.x, y1: tower.y, x2: target.x, y2: target.y,
      color: '#aa00ff', life: 0.2, maxLife: 0.2, width: 3, tesla: true
    });
    spawnParticles(target.x, target.y, '#aa00ff', 4, 50, 0.4);
  }
}

// ─── ENEMY LOGIC ─────────────────────────────────
let enemyIdCounter = 0;
function createEnemy(type, hpMult) {
  const def = ENEMY_DEFS[type];
  return {
    id: ++enemyIdCounter,
    type, ...def,
    hp: Math.floor(def.hp * hpMult),
    maxHp: Math.floor(def.hp * hpMult),
    speed: def.speed,
    baseSpeed: def.speed,
    pathProgress: 0,
    x: 0, y: 0,
    dead: false,
    slowTimer: 0,
    slowFactor: 1,
    spawnTime: 0,
    trailTimer: 0,
    stealth: def.stealth || false,
    burnTimer: 0,
    burnDmg: 0
  };
}

function dealDamage(enemy, dmg, towerType) {
  if (enemy.dead) return;
  // Crit chance from tech
  let finalDmg = dmg;
  let isCrit = false;
  if (unlockedTech.has('crit') && Math.random() < 0.15) {
    finalDmg = Math.floor(dmg * 2);
    isCrit = true;
  }
  enemy.hp -= finalDmg;
  // Burn DOT from tech (flame & pulse)
  if (unlockedTech.has('burn') && (towerType === 'flame' || towerType === 'pulse')) {
    enemy.burnTimer = 3; // 3 seconds of DOT
    enemy.burnDmg = Math.max(2, Math.floor(dmg * 0.15)); // 15% dmg per tick
  }
  // Floating damage number
  if (finalDmg > 20 || isCrit) {
    const critText = isCrit ? '!' : '';
    spawnFloatingText(enemy.x + (Math.random()-0.5)*10, enemy.y - 10, '-' + finalDmg + critText, isCrit ? '#ff00ff' : '#ff4444', isCrit ? 16 : 11);
  }
  if (enemy.hp <= 0) {
    enemy.dead = true;
    // Combo system
    comboCount++;
    comboTimer = COMBO_TIMEOUT;
    if (comboCount > maxCombo) maxCombo = comboCount;
    totalKills++;
    // Combo bonus: extra credits for streaks
    let comboBonus = 0;
    if (comboCount >= 10) comboBonus = Math.floor(enemy.reward * 0.5);
    else if (comboCount >= 5) comboBonus = Math.floor(enemy.reward * 0.25);
    const baseReward = Math.floor(enemy.reward * getTechRewardMultiplier());
    const totalReward = baseReward + comboBonus;
    credits += totalReward;
    creditsEarned += totalReward;
    score += enemy.reward * 2 + comboBonus * 3;
    spawnExplosion(enemy.x, enemy.y, enemy.color, enemy.type === 'boss');
    // Floating reward text
    let rewardText = '+' + totalReward + '\u00A2';
    if (comboBonus > 0) rewardText += ' (x' + comboCount + ')';
    spawnFloatingText(enemy.x, enemy.y - 20, rewardText, '#ffcc00', comboCount >= 10 ? 18 : 14);
    // Combo milestone announcements
    if (comboCount === 10) spawnFloatingText(enemy.x, enemy.y - 40, '\u26A1 COMBO x10!', '#ff00ff', 20);
    else if (comboCount === 25) spawnFloatingText(enemy.x, enemy.y - 40, '\u{1F525} MEGA COMBO x25!', '#ff6600', 22);
    else if (comboCount === 50) spawnFloatingText(enemy.x, enemy.y - 40, '\u2B50 ULTRA COMBO x50!', '#ffcc00', 26);
    // Find tower that killed it for kill counter
    for (const [, t] of towers) {
      const d = Math.hypot(t.x - enemy.x, t.y - enemy.y);
      if (d <= t.range + cellSize) { t.kills++; break; }
    }
  }
}

// ─── WAVE MANAGEMENT ─────────────────────────────
function generateWave(num) {
  const w = [];
  const hpMult = 1 + (num - 1) * 0.18;
  const droneCount = Math.floor(4 + num * 1.8);
  const walkerCount = num >= 3 ? Math.floor(1 + (num - 2) * 1.2) : 0;
  const phantomCount = num >= 4 ? Math.floor((num - 3) * 0.7) : 0;
  const heavyCount = num >= 6 ? Math.floor((num - 5) * 0.6) : 0;
  const hasBoss = num > 0 && num % 5 === 0;
  let t = 0;
  for (let i = 0; i < droneCount; i++) {
    w.push({ type: 'drone', time: t, hpMult });
    t += 0.7 - Math.min(0.3, num * 0.02);
  }
  t += 0.5;
  for (let i = 0; i < phantomCount; i++) {
    w.push({ type: 'phantom', time: t, hpMult });
    t += 0.6;
  }
  t += 0.3;
  for (let i = 0; i < walkerCount; i++) {
    w.push({ type: 'walker', time: t, hpMult });
    t += 1.1;
  }
  t += 0.5;
  for (let i = 0; i < heavyCount; i++) {
    w.push({ type: 'heavy', time: t, hpMult });
    t += 1.8;
  }
  if (hasBoss) {
    t += 1;
    w.push({ type: 'boss', time: t, hpMult: hpMult * 1.5 });
  }
  return w;
}

function getWavePreview(num) {
  const hpMult = 1 + (num - 1) * 0.18;
  const preview = {};
  const droneCount = Math.floor(4 + num * 1.8);
  if (droneCount > 0) preview.drone = droneCount;
  const phantomCount = num >= 4 ? Math.floor((num - 3) * 0.7) : 0;
  if (phantomCount > 0) preview.phantom = phantomCount;
  const walkerCount = num >= 3 ? Math.floor(1 + (num - 2) * 1.2) : 0;
  if (walkerCount > 0) preview.walker = walkerCount;
  const heavyCount = num >= 6 ? Math.floor((num - 5) * 0.6) : 0;
  if (heavyCount > 0) preview.heavy = heavyCount;
  if (num > 0 && num % 5 === 0) preview.boss = 1;
  return preview;
}

function startWave() {
  wave++;
  waveQueue = generateWave(wave);
  waveTimer = 0;
  waveActive = true;
  waveBanner = { text: 'WAVE ' + wave, alpha: 1, timer: 2 };
  playSfx('wave');
}

// ─── UPDATE ──────────────────────────────────────
function update(dt) {
  gameTime += dt;
  
  // Screen shake decay
  if (screenShake.intensity > 0) {
    screenShake.x = (Math.random() - 0.5) * screenShake.intensity;
    screenShake.y = (Math.random() - 0.5) * screenShake.intensity;
    screenShake.intensity *= 0.9;
    if (screenShake.intensity < 0.1) screenShake.intensity = 0;
  }

  // Wave banner
  if (waveBanner.timer > 0) {
    waveBanner.timer -= dt;
    if (waveBanner.timer < 0.5) waveBanner.alpha = waveBanner.timer / 0.5;
  }

  // Spawn enemies
  if (waveActive && waveQueue.length > 0) {
    waveTimer += dt;
    while (waveQueue.length > 0 && waveTimer >= waveQueue[0].time) {
      const info = waveQueue.shift();
      const e = createEnemy(info.type, info.hpMult);
      enemies.push(e);
    }
  }

  // Check wave complete
  if (waveActive && waveQueue.length === 0 && enemies.length === 0) {
    waveActive = false;
    const bonus = 20 + wave * 5;
    credits += bonus;
    creditsEarned += bonus;
    score += bonus * 3;
    // Award tech points
    const tp = 10 + wave * 5;
    techPoints += tp;
    // Regen tech: +1 life every 3 waves
    let regenMsg = '';
    if (unlockedTech.has('regen') && wave % 3 === 0) {
      lives = Math.min(lives + 1, 20);
      regenMsg = '  ❤+1';
      spawnFloatingText(COLS * CELL / 2, ROWS * CELL / 2, '+1 ❤', '#66aaff', 20);
    }
    waveBanner = { text: 'WAVE ' + wave + ' CLEARED! +' + bonus + '¢  ⚡+' + tp + 'tp' + regenMsg, alpha: 1, timer: 2.5 };
  }

  // Update enemies
  for (const e of enemies) {
    if (e.dead) continue;
    // Slow timer
    if (e.slowTimer > 0) {
      e.slowTimer -= dt;
      e.speed = e.baseSpeed * e.slowFactor;
    } else {
      e.speed = e.baseSpeed;
    }
    // Burn DOT tick
    if (e.burnTimer > 0) {
      e.burnTimer -= dt;
      if (Math.random() < dt * 3) { // ~3 ticks per second
        e.hp -= e.burnDmg;
        spawnParticles(e.x, e.y, '#ff4400', 1, 20, 0.15);
        if (e.hp <= 0 && !e.dead) {
          e.dead = true;
          comboCount++; comboTimer = COMBO_TIMEOUT;
          if (comboCount > maxCombo) maxCombo = comboCount;
          totalKills++;
          const reward = Math.floor(e.reward * getTechRewardMultiplier());
          credits += reward; creditsEarned += reward;
          score += reward * 2;
          spawnExplosion(e.x, e.y, e.color, false);
          spawnFloatingText(e.x, e.y - 15, '+' + reward + '\\u00A2', '#ffcc00', 13);
        }
      }
    }
    e.pathProgress += e.speed * dt;
    const pos = getPathPosition(e.pathProgress);
    e.x = pos.x;
    e.y = pos.y;
    // Trail particles (throttled)
    e.trailTimer -= dt;
    if (e.trailTimer <= 0 && particles.length < 200) {
      e.trailTimer = 0.15;
      particles.push({
        x: e.x + (Math.random()-0.5)*6,
        y: e.y + (Math.random()-0.5)*6,
        vx: 0, vy: 0,
        life: 0.25, maxLife: 0.25,
        color: e.color, size: e.size * cellSize * 0.25
      });
    }
    // Reached end
    if (e.pathProgress >= fullPath.length - 1) {
      e.dead = true;
      lives--;
      screenShake.intensity = 5;
      spawnParticles(e.x, e.y, '#ff0044', 8, 80, 0.3);
      if (lives <= 0) {
        gamePhase = 'gameover';
        saveHighScore();
        document.getElementById('finalScore').textContent = 'SCORE: ' + score;
        document.getElementById('statWave').textContent = wave;
        document.getElementById('statKills').textContent = totalKills;
        document.getElementById('statCombo').textContent = maxCombo;
        document.getElementById('statTowers').textContent = towersBuilt;
        document.getElementById('highScoreDisplay').textContent = 'BEST: ' + highScore + '  |  WAVE: ' + highWave;
        if (score >= highScore) {
          document.getElementById('newRecordBanner').style.display = 'block';
        } else {
          document.getElementById('newRecordBanner').style.display = 'none';
        }
        document.getElementById('gameOverScreen').style.display = 'flex';
      }
    }
  }
  enemies = enemies.filter(e => !e.dead);

  // Update towers
  for (const [, t] of towers) {
    t.pulseTime = Math.max(0, t.pulseTime - dt);
    const target = findTarget(t);
    if (target) {
      towerShoot(t, target, dt);
    } else {
      t.cooldown = Math.max(0, t.cooldown - dt);
      t.angle += dt * 0.5;
    }
  }

  // Update projectiles
  for (const p of projectiles) {
    // Find live target or use last known position
    let tx = p.tx, ty = p.ty;
    for (const e of enemies) {
      if (e.id === p.targetId && !e.dead) {
        tx = e.x; ty = e.y;
        p.tx = tx; p.ty = ty;
        break;
      }
    }
    const dx = tx - p.x, dy = ty - p.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 10) {
      // Impact
      if (p.splash) {
        for (const e of enemies) {
          if (!e.dead && Math.hypot(e.x - tx, e.y - ty) < p.splash) {
            dealDamage(e, p.dmg, 'plasma');
          }
        }
        spawnExplosion(tx, ty, p.color, false);
      }
      p.dead = true;
    } else {
      const spd = p.speed * dt;
      p.x += (dx / dist) * spd;
      p.y += (dy / dist) * spd;
      p.trail.push({ x: p.x, y: p.y, life: 0.2 });
      if (p.trail.length > 12) p.trail.shift();
    }
  }
  projectiles = projectiles.filter(p => !p.dead);
  // Update beam trails
  for (const p of projectiles) {
    for (const t of p.trail) t.life -= dt;
    p.trail = p.trail.filter(t => t.life > 0);
  }

  // Update beams
  for (const b of beams) b.life -= dt;
  beams = beams.filter(b => b.life > 0);

  // Update particles
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);
  if (particles.length > 500) particles.splice(0, particles.length - 500);

  // Flow dots
  for (const fd of flowDots) {
    fd.progress += fd.speed * dt;
    if (fd.progress >= fullPath.length) fd.progress -= fullPath.length;
  }

  // Floating texts
  for (const ft of floatingTexts) {
    ft.y += ft.vy * dt;
    ft.life -= dt;
  }
  floatingTexts = floatingTexts.filter(ft => ft.life > 0);

  // Ambient particles
  for (const ap of ambientParticles) {
    ap.x += ap.vx;
    ap.y += ap.vy;
    ap.alpha = 0.15 + Math.sin(gameTime * 2 + ap.hue) * 0.1;
    if (ap.y < -10) { ap.y = logicalH + 10; ap.x = Math.random() * logicalW; }
    if (ap.x < -10) ap.x = logicalW + 10;
    if (ap.x > logicalW + 10) ap.x = -10;
  }
}

// ─── RENDERING ───────────────────────────────────
function render() {
  const W = logicalW, H = logicalH;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.save();

  // Camera offset
  const offset = camYSmooth * H; // how many pixels to shift up

  // === CLEAR ===
  ctx.fillStyle = '#050008';
  ctx.fillRect(0, 0, W, H);

  // ╔══════════════════════════════════════╗
  // ║  SKY VIEW (tech tree) — upper layer ║
  // ╚══════════════════════════════════════╝
  ctx.save();
  ctx.translate(0, offset - H); // Sky view lives at -H..0, offset brings it into view
  // Only render if visible
  if (camYSmooth > 0.01) {
    drawSkyView(W, H);
  }
  ctx.restore();

  // ╔══════════════════════════════════════╗
  // ║  GROUND VIEW (game) — lower layer   ║
  // ╚══════════════════════════════════════╝
  ctx.save();
  ctx.translate(screenShake.x, screenShake.y);
  ctx.translate(0, offset);

  // === SKY BACKDROP (visible behind game) ===
  if (camYSmooth < 0.98) {
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#05000d');
  skyGrad.addColorStop(0.3, '#0d0020');
  skyGrad.addColorStop(0.55, '#1a0035');
  skyGrad.addColorStop(0.8, '#0a0018');
  skyGrad.addColorStop(1, '#050010');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars (fast rects instead of arcs)
  ctx.fillStyle = '#ffffff';
  for (const s of stars) {
    const twinkle = 0.3 + Math.sin(gameTime * s.speed + s.twinkle) * 0.35 + 0.35;
    ctx.globalAlpha = twinkle;
    const sz = s.size;
    ctx.fillRect(s.x - sz * 0.5, s.y - sz * 0.5, sz, sz);
  }
  ctx.globalAlpha = 1;

  // Sun
  drawSun(W * 0.5, H * 0.22);

  // Mountains at horizon
  drawMountains();

  // === GROUND PLANE ===
  drawGroundPlane(W, H);

  // Ambient particles
  for (const ap of ambientParticles) {
    ctx.globalAlpha = ap.alpha;
    ctx.fillStyle = `hsl(${ap.hue}, 100%, 70%)`;
    ctx.fillRect(ap.x - ap.size * 0.5, ap.y - ap.size * 0.5, ap.size, ap.size);
  }
  ctx.globalAlpha = 1;

  // === GRID ===
  drawGrid();

  // === PATH ===
  drawPath();

  // === FLOW DOTS (fast rects) ===
  ctx.fillStyle = '#00ffff';
  for (const fd of flowDots) {
    const pos = getPathPosition(fd.progress);
    ctx.globalAlpha = 0.5 + Math.sin(fd.progress + gameTime * 3) * 0.3;
    ctx.fillRect(pos.x - 2, pos.y - 2, 4, 4);
  }
  ctx.globalAlpha = 1;

  // === HOVER PREVIEW ===
  if (hoveredCell && selectedType && gamePhase === 'playing' && camYSmooth < 0.3) {
    const { col, row } = hoveredCell;
    const key = col + ',' + row;
    const def = TOWER_DEFS[selectedType];
    const canPlace = !pathSet.has(key) && !towers.has(key) && col >= 0 && col < COLS && row >= 0 && row < ROWS && !def.locked;
    const cx = gridX + (col + 0.5) * cellSize;
    const cy = gridY + (row + 0.5) * cellSize;
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = canPlace ? def.color : '#ff0044';
    ctx.beginPath();
    ctx.arc(cx, cy, def.range * cellSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = canPlace ? def.color : '#ff0044';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
    ctx.globalAlpha = 0.6;
    drawTowerShape(cx, cy, selectedType, def.color, cellSize * 0.35, 0, 1);
    ctx.globalAlpha = 1;
  }

  // === TOWERS ===
  for (const [, t] of towers) {
    drawTower(t);
  }

  // Selected tower range circle
  const showTower = selectedTowerKey ? towers.get(selectedTowerKey) : null;
  if (showTower && !selectedType) {
    const t = showTower;
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = t.color;
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.6;
    ctx.strokeStyle = t.color;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = t.color;
    ctx.lineWidth = 2;
    ctx.strokeRect(gridX + t.col * cellSize + 2, gridY + t.row * cellSize + 2, cellSize - 4, cellSize - 4);
  }

  // === ENEMIES ===
  for (const e of enemies) {
    if (e.dead) continue;
    drawEnemy(e);
  }

  // === BEAMS ===
  for (const b of beams) {
    drawBeam(b);
  }

  // === PROJECTILES ===
  for (const p of projectiles) {
    drawProjectile(p);
  }

  // === PARTICLES ===
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size * alpha * 0.5, p.y - p.size * alpha * 0.5, p.size * alpha, p.size * alpha);
  }
  ctx.globalAlpha = 1;

  // === FLOATING TEXTS ===
  for (const ft of floatingTexts) {
    const alpha = ft.life / ft.maxLife;
    ctx.globalAlpha = alpha;
    ctx.font = 'bold ' + ft.size + 'px monospace';
    ctx.fillStyle = ft.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';

  } // end if (camYSmooth < 0.98)

  ctx.restore(); // end ground view

  // === FIXED UI (not affected by camera) ===
  ctx.save();
  ctx.translate(screenShake.x, screenShake.y);

  // Scanlines (reduced for performance — every 6px)
  ctx.globalAlpha = 0.03;
  ctx.fillStyle = '#000000';
  for (let y = 0; y < H; y += 6) {
    ctx.fillRect(0, y, W, 1);
  }
  ctx.globalAlpha = 1;

  // HUD & bottom panel only when game view visible
  if (camYSmooth < 0.8) {
    ctx.globalAlpha = 1 - camYSmooth;
    drawHUD();
    drawPanel();
    ctx.globalAlpha = 1;
  }

  // Wave banner
  if (waveBanner.timer > 0 && camYSmooth < 0.5) {
    ctx.globalAlpha = waveBanner.alpha * (1 - camYSmooth * 2);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + Math.min(52, W * 0.06) + 'px "Segoe UI", monospace';
    ctx.fillStyle = '#ff00ff';
    ctx.fillText(waveBanner.text, W / 2, H * 0.35);
    ctx.globalAlpha = 1;
  }

  // Camera indicator arrows
  drawCameraHint(W, H);

  ctx.restore();
}

// ─── DRAW SUB-FUNCTIONS ──────────────────────────
// ─── GROUND PLANE ────────────────────────────────
function drawGroundPlane(W, H) {
  // Dark ground from horizon down to game grid
  const horizonY = H * 0.35;
  const groundGrad = ctx.createLinearGradient(0, horizonY, 0, gridY + gridH + 40);
  groundGrad.addColorStop(0, '#0a001488');
  groundGrad.addColorStop(0.1, '#06001088');
  groundGrad.addColorStop(0.4, '#03000888');
  groundGrad.addColorStop(1, '#02000488');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, horizonY, W, gridY + gridH + 100 - horizonY);

  // Perspective grid on ground
  ctx.strokeStyle = '#1a0033';
  ctx.lineWidth = 0.7;
  // Horizontal lines (get wider towards bottom)
  const startY2 = horizonY + 10;
  const endY = gridY + gridH + 40;
  for (let i = 0; i < 12; i++) {
    const t = Math.pow(i / 12, 1.8);
    const y = startY2 + t * (endY - startY2);
    const alpha = 0.1 + t * 0.15;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  // Vertical lines converging to horizon
  const centerX = W / 2;
  const vanishY = horizonY;
  for (let i = -6; i <= 6; i++) {
    const baseX = centerX + i * (W / 14);
    ctx.globalAlpha = 0.08 + Math.abs(i) * 0.005;
    ctx.beginPath();
    ctx.moveTo(centerX + i * 3, vanishY);
    ctx.lineTo(baseX, endY);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Horizon glow line
  ctx.strokeStyle = '#ff006622';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, horizonY);
  ctx.lineTo(W, horizonY);
  ctx.stroke();
  // Game area "pad" — raised platform
  const padX = gridX - 8;
  const padY2 = gridY - 8;
  const padW = gridW + 16;
  const padH2 = gridH + 16;
  // Platform shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(padX + 4, padY2 + 4, padW, padH2);
  // Platform body
  const platformGrad = ctx.createLinearGradient(padX, padY2, padX, padY2 + padH2);
  platformGrad.addColorStop(0, '#0d0018');
  platformGrad.addColorStop(0.5, '#080012');
  platformGrad.addColorStop(1, '#0a0015');
  ctx.fillStyle = platformGrad;
  ctx.fillRect(padX, padY2, padW, padH2);
  // Platform neon border
  ctx.strokeStyle = '#ff00ff33';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(padX, padY2, padW, padH2);
  // Corner accents
  const cornerLen = 20;
  ctx.strokeStyle = '#ff00ff66';
  ctx.lineWidth = 2;
  // Top-left
  ctx.beginPath();
  ctx.moveTo(padX, padY2 + cornerLen); ctx.lineTo(padX, padY2); ctx.lineTo(padX + cornerLen, padY2);
  ctx.stroke();
  // Top-right
  ctx.beginPath();
  ctx.moveTo(padX + padW - cornerLen, padY2); ctx.lineTo(padX + padW, padY2); ctx.lineTo(padX + padW, padY2 + cornerLen);
  ctx.stroke();
  // Bottom-left
  ctx.beginPath();
  ctx.moveTo(padX, padY2 + padH2 - cornerLen); ctx.lineTo(padX, padY2 + padH2); ctx.lineTo(padX + cornerLen, padY2 + padH2);
  ctx.stroke();
  // Bottom-right
  ctx.beginPath();
  ctx.moveTo(padX + padW - cornerLen, padY2 + padH2); ctx.lineTo(padX + padW, padY2 + padH2); ctx.lineTo(padX + padW, padY2 + padH2 - cornerLen);
  ctx.stroke();
}

// ─── SKY VIEW (Tech Tree) ────────────────────────
let techTreeBtns = [];
let hoveredTechNode = null;

function drawSkyView(W, H) {
  // Background — reuse the sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#05000d');
  skyGrad.addColorStop(0.25, '#0d0020');
  skyGrad.addColorStop(0.5, '#1a0035');
  skyGrad.addColorStop(0.75, '#0d001a');
  skyGrad.addColorStop(1, '#050010');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars in sky view (round)
  ctx.fillStyle = '#ffffff';
  for (const s of stars) {
    const twinkle = 0.2 + Math.sin(gameTime * s.speed * 0.7 + s.twinkle) * 0.2 + 0.2;
    ctx.globalAlpha = twinkle * 0.6;
    ctx.beginPath();
    ctx.arc(s.x, s.y * 0.8, s.size * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Sun glow (smaller, at top)
  drawSun(W * 0.5, H * 0.08);

  // Title (above sun)
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 36px "Segoe UI", monospace';
  ctx.fillStyle = '#ff00ff';
  ctx.fillText('TECH TREE', W / 2, H * 0.22);

  // Tech points display
  ctx.font = 'bold 18px monospace';
  ctx.fillStyle = '#ffcc00';
  ctx.fillText('\u26A1 Tech Points: ' + techPoints, W / 2, H * 0.27);

  // Draw tech tree nodes — responsive
  techTreeBtns = [];
  const nodeW = Math.min(150, W * 0.17);
  const nodeH = nodeW < 100 ? 55 : 72;
  const gapX = nodeW + (nodeW < 100 ? 8 : 18);
  const gapY = nodeH + (nodeW < 100 ? 12 : 25);
  const treeCols = 5;
  const treeW = treeCols * gapX - (gapX - nodeW);
  const treeBaseX = (W - treeW) / 2;
  const treeBaseY = H * 0.32;

  // Draw connections first
  ctx.strokeStyle = '#333355';
  ctx.lineWidth = 2;
  for (const tech of TECH_TREE) {
    if (tech.requires) {
      const parent = TECH_TREE.find(t => t.id === tech.requires);
      if (parent) {
        const px = treeBaseX + parent.col * gapX + nodeW / 2;
        const py = treeBaseY + parent.row * gapY + nodeH;
        const cx2 = treeBaseX + tech.col * gapX + nodeW / 2;
        const cy2 = treeBaseY + tech.row * gapY;
        const unlocked = unlockedTech.has(parent.id);
        ctx.strokeStyle = unlocked ? tech.color + '55' : '#222233';
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(cx2, cy2);
        ctx.stroke();
      }
    }
  }

  // Draw nodes
  for (const tech of TECH_TREE) {
    const nx = treeBaseX + tech.col * gapX;
    const ny = treeBaseY + tech.row * gapY;
    const isUnlocked = unlockedTech.has(tech.id);
    const canUnlock = !isUnlocked && techPoints >= tech.cost && (!tech.requires || unlockedTech.has(tech.requires));
    const isLocked = !isUnlocked && !canUnlock;

    techTreeBtns.push({ x: nx, y: ny, w: nodeW, h: nodeH, tech });

    // Node background
    if (isUnlocked) {
      ctx.fillStyle = tech.color + '22';
      ctx.strokeStyle = tech.color + 'aa';
    } else if (canUnlock) {
      ctx.fillStyle = 'rgba(20,10,40,0.85)';
      ctx.strokeStyle = tech.color + '88';
    } else {
      ctx.fillStyle = 'rgba(10,5,20,0.7)';
      ctx.strokeStyle = '#222233';
    }
    ctx.lineWidth = isUnlocked ? 2 : 1.5;
    roundedRect(nx, ny, nodeW, nodeH, 6);
    ctx.fill();
    ctx.stroke();
    // Hover glow
    const skyOffset = camYSmooth * H;
    const localMY = mouseY - skyOffset + H;
    if (canUnlock && mouseX >= nx && mouseX <= nx + nodeW && localMY >= ny && localMY <= ny + nodeH && camYSmooth > 0.7) {
      ctx.fillStyle = tech.color + '15';
      roundedRect(nx, ny, nodeW, nodeH, 6);
      ctx.fill();
      hoveredTechNode = tech;
    }

    // Icon (tower shape or star)
    ctx.globalAlpha = isLocked ? 0.25 : 1;
    const iconOff = nodeW < 100 ? 18 : 26;
    const textOff = nodeW < 100 ? 34 : 48;
    const iconSz = nodeW < 100 ? 10 : 15;
    if (tech.unlocks) {
      drawTowerShape(nx + iconOff, ny + nodeH / 2, tech.unlocks, tech.color, iconSz, gameTime * (isUnlocked ? 1 : 0.3), 1);
    } else {
      // Stat upgrade icon — different per type
      ctx.fillStyle = tech.color;
      ctx.font = (nodeW < 100 ? '14' : '20') + 'px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const icon = tech.id.startsWith('dmg') ? '\u2694' :
                   tech.id.startsWith('range') ? '\u25CE' :
                   tech.id.startsWith('rate') ? '\u26A1' :
                   tech.id.startsWith('econ') ? '\u2B50' :
                   tech.id === 'reveal' ? '\u{1F441}' :
                   tech.id === 'burn' ? '\u{1F525}' :
                   tech.id === 'crit' ? '\u2620' :
                   tech.id === 'multi' ? '\u2726' :
                   tech.id === 'regen' ? '\u2764' : '\u2B06';
      ctx.fillText(icon, nx + iconOff, ny + nodeH / 2);
    }
    ctx.globalAlpha = 1;

    // Name
    ctx.font = 'bold ' + (nodeW < 100 ? '9' : '12') + 'px monospace';
    ctx.fillStyle = isLocked ? '#444455' : tech.color;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(tech.name, nx + textOff, ny + (nodeW < 100 ? 4 : 8));

    // Cost or UNLOCKED
    ctx.font = (nodeW < 100 ? '8' : '11') + 'px monospace';
    if (isUnlocked) {
      ctx.fillStyle = '#00ff88';
      ctx.fillText('\u2713 UNLOCKED', nx + textOff, ny + (nodeW < 100 ? 16 : 24));
    } else {
      ctx.fillStyle = canUnlock ? '#ffcc00' : '#444455';
      ctx.fillText('\u26A1 ' + tech.cost + ' pts', nx + textOff, ny + (nodeW < 100 ? 16 : 24));
    }

    // Description
    if (nodeW >= 100) {
      ctx.font = '10px monospace';
      ctx.fillStyle = isLocked ? '#333344' : '#888899';
      const maxChars = Math.floor((nodeW - textOff - 4) / 6);
      ctx.fillText(tech.desc.substring(0, maxChars), nx + textOff, ny + 40);
      if (tech.desc.length > maxChars) ctx.fillText(tech.desc.substring(maxChars, maxChars * 2), nx + textOff, ny + 53);
    } else {
      ctx.font = '7px monospace';
      ctx.fillStyle = isLocked ? '#333344' : '#888899';
      const maxChars = Math.floor((nodeW - textOff - 4) / 4);
      ctx.fillText(tech.desc.substring(0, maxChars), nx + textOff, ny + 30);
    }
  }

  ctx.textAlign = 'left';
}

function drawCameraHint(W, H) {
  // Arrow hint at top/bottom edge showing you can scroll
  if (camYSmooth < 0.9) {
    // Hint at top → hover to go to tech tree
    const alpha = 0.5 + Math.sin(gameTime * 3) * 0.15;
    ctx.globalAlpha = alpha * (1 - camYSmooth);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = '#00ffff';
    ctx.fillText('\u25B2 TECH TREE \u25B2', W / 2, 8);
    ctx.globalAlpha = 1;
  }
  if (camYSmooth > 0.1) {
    // Hint at bottom → hover to go to battlefield
    const alpha = 0.5 + Math.sin(gameTime * 3) * 0.15;
    ctx.globalAlpha = alpha * camYSmooth;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = '#ff00ff';
    ctx.fillText('\u25BC BATTLEFIELD \u25BC', W / 2, H - 8);
    ctx.globalAlpha = 1;
  }

  // Mobile camera toggle button (always visible on touch devices)
  if (isMobile) {
    const btnW = 44, btnH = 44;
    const btnX = W - btnW - 10;
    const btnY = 10;
    // Background
    ctx.fillStyle = 'rgba(10,0,25,0.8)';
    ctx.strokeStyle = camYSmooth > 0.5 ? '#ff00ff88' : '#00ffff88';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(btnX + btnW / 2, btnY + btnH / 2, btnW / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // Icon
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 20px monospace';
    ctx.fillStyle = camYSmooth > 0.5 ? '#ff00ff' : '#00ffff';
    ctx.fillText(camYSmooth > 0.5 ? '⚔' : '⚡', btnX + btnW / 2, btnY + btnH / 2);
    // Label
    ctx.font = '9px monospace';
    ctx.fillText(camYSmooth > 0.5 ? 'BATTLE' : 'TECH', btnX + btnW / 2, btnY + btnH + 8);
    mobileCamBtn = { x: btnX - 4, y: btnY - 4, w: btnW + 8, h: btnH + 8 };
  } else {
    mobileCamBtn = null;
  }
}

function drawSun(cx, cy) {
  const r = Math.min(logicalW, logicalH) * 0.12;
  // Outer glow
  const glowGrad = ctx.createRadialGradient(cx, cy, r * 0.3, cx, cy, r * 2.5);
  glowGrad.addColorStop(0, 'rgba(255,100,0,0.35)');
  glowGrad.addColorStop(0.3, 'rgba(255,60,0,0.15)');
  glowGrad.addColorStop(0.6, 'rgba(255,0,100,0.06)');
  glowGrad.addColorStop(1, 'rgba(255,0,100,0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 2.5, 0, Math.PI * 2);
  ctx.fill();
  // Sun body
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.clip();
  const sunGrad = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
  sunGrad.addColorStop(0, '#ff0066');
  sunGrad.addColorStop(0.4, '#ff4400');
  sunGrad.addColorStop(0.7, '#ffaa00');
  sunGrad.addColorStop(1, '#ffcc44');
  ctx.fillStyle = sunGrad;
  ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
  // Horizontal bands
  ctx.fillStyle = '#0a0014';
  for (let i = 0; i < 8; i++) {
    const bandY = cy + r * (-0.15 + i * 0.15);
    const bandH = 1 + i * 1.8;
    ctx.fillRect(cx - r, bandY, r * 2, bandH);
  }
  ctx.restore();
}

function drawMountains() {
  if (mountainPoints.length < 2) return;
  const W = logicalW, baseY = logicalH * 0.32;
  // Back mountains (darker, taller)
  ctx.beginPath();
  ctx.moveTo(0, baseY + 30);
  for (const p of mountainPoints) ctx.lineTo(p.x, p.y1);
  ctx.lineTo(W, baseY + 30);
  ctx.closePath();
  ctx.fillStyle = '#0d0018';
  ctx.fill();
  // Neon edge
  ctx.beginPath();
  for (let i = 0; i < mountainPoints.length; i++) {
    i === 0 ? ctx.moveTo(mountainPoints[i].x, mountainPoints[i].y1) : ctx.lineTo(mountainPoints[i].x, mountainPoints[i].y1);
  }
  ctx.strokeStyle = '#ff006633';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Front mountains (slightly lighter)
  ctx.beginPath();
  ctx.moveTo(0, baseY + 30);
  for (const p of mountainPoints) ctx.lineTo(p.x, p.y2);
  ctx.lineTo(W, baseY + 30);
  ctx.closePath();
  ctx.fillStyle = '#0a0014';
  ctx.fill();
  ctx.beginPath();
  for (let i = 0; i < mountainPoints.length; i++) {
    i === 0 ? ctx.moveTo(mountainPoints[i].x, mountainPoints[i].y2) : ctx.lineTo(mountainPoints[i].x, mountainPoints[i].y2);
  }
  ctx.strokeStyle = '#aa00ff22';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawGrid() {
  const pulse = 0.08 + Math.sin(gameTime * 1.5) * 0.03;
  ctx.globalAlpha = pulse;
  ctx.strokeStyle = '#4400aa';
  ctx.lineWidth = 0.5;
  // Vertical lines
  for (let c = 0; c <= COLS; c++) {
    const x = gridX + c * cellSize;
    ctx.beginPath();
    ctx.moveTo(x, gridY);
    ctx.lineTo(x, gridY + gridH);
    ctx.stroke();
  }
  // Horizontal lines
  for (let r = 0; r <= ROWS; r++) {
    const y = gridY + r * cellSize;
    ctx.beginPath();
    ctx.moveTo(gridX, y);
    ctx.lineTo(gridX + gridW, y);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawPath() {
  if (fullPath.length < 2) return;
  const pw = cellSize * 0.7; // path width

  // Build smooth center-line points
  const pts = fullPath.map(([c,r]) => cellToWorld(c,r));

  // Draw road fill  — dark translucent
  ctx.save();
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  // Outer glow layer
  ctx.lineWidth = pw + 10;
  ctx.strokeStyle = 'rgba(0,255,255,0.04)';
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.stroke();
  // Main road body
  ctx.lineWidth = pw;
  const roadGrad = ctx.createLinearGradient(gridX, gridY, gridX+gridW, gridY+gridH);
  roadGrad.addColorStop(0, 'rgba(10,0,30,0.85)');
  roadGrad.addColorStop(0.5, 'rgba(15,0,40,0.9)');
  roadGrad.addColorStop(1, 'rgba(10,0,30,0.85)');
  ctx.strokeStyle = roadGrad;
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.stroke();

  // Neon edge lines (single combined pass)
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'rgba(255,0,255,0.5)';
  const edgeOff = pw / 2 - 1;
  for (let side = -1; side <= 1; side += 2) {
    ctx.beginPath();
    for (let i = 0; i < pts.length - 1; i++) {
      const dx = pts[i+1].x - pts[i].x;
      const dy = pts[i+1].y - pts[i].y;
      const len = Math.hypot(dx,dy) || 1;
      const nx = -dy/len * edgeOff * side;
      const ny = dx/len * edgeOff * side;
      if (i === 0) ctx.moveTo(pts[i].x+nx, pts[i].y+ny);
      ctx.lineTo(pts[i+1].x+nx, pts[i+1].y+ny);
    }
    ctx.stroke();
  }
  // Center dashed line (animated)
  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(0,255,255,0.2)';
  const dashOffset = (gameTime * 40) % 20;
  ctx.setLineDash([6, 8]);
  ctx.lineDashOffset = -dashOffset;
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.stroke();
  ctx.setLineDash([]);

  // Entrance & exit markers
  const entry = pts[0];
  const exit = pts[pts.length - 1];
  // Entry arrow
  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('▶', entry.x - 12, entry.y);
  // Exit marker
  ctx.fillStyle = '#ff0044';
  ctx.fillText('✕', exit.x + 12, exit.y);

  ctx.restore();
}

function drawTower(t) {
  const size = cellSize * 0.38 * (1 + (t.level - 1) * 0.12);
  const pulse = t.pulseTime > 0 ? 1.2 : 1;
  drawTowerShape(t.x, t.y, t.type, t.color, size * pulse, t.angle, t.level);
  // Level stars below tower
  for (let i = 0; i < t.level; i++) {
    const ox = t.x - (t.level - 1) * 5 + i * 10;
    const oy = t.y + size + 10;
    ctx.fillStyle = '#ffcc00';
    drawStar5(ox, oy, 3, 1.5);
  }
}

function drawStar5(cx, cy, outerR, innerR) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = Math.PI / 5 * i - Math.PI / 2;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

function drawTowerShape(cx, cy, type, color, size, angle, level) {
  ctx.save();
  ctx.translate(cx, cy);

  // === BASE PLATFORM (all towers) ===
  ctx.fillStyle = 'rgba(10,0,25,0.8)';
  ctx.strokeStyle = color + '55';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const a = Math.PI / 4 * i + Math.PI / 8;
    const r = size * 1.3;
    const px = Math.cos(a) * r;
    const py = Math.sin(a) * r;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // === ROTATING ENERGY RING ===
  ctx.strokeStyle = color + '30';
  ctx.lineWidth = 1.5;
  const ringR = size * 1.1;
  ctx.beginPath();
  ctx.arc(0, 0, ringR, angle, angle + Math.PI * 1.2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, ringR, angle + Math.PI, angle + Math.PI + Math.PI * 0.8);
  ctx.stroke();
  // Orbiting dots on ring
  for (let i = 0; i < level + 1; i++) {
    const da = angle * 2 + i * Math.PI * 2 / (level + 1);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(Math.cos(da) * ringR, Math.sin(da) * ringR, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // === MAIN TOWER BODY ===
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;

  if (type === 'laser') {
    // Multi-layer diamond with turret barrel
    ctx.fillStyle = color + '22';
    ctx.rotate(Math.PI / 4);
    ctx.beginPath();
    ctx.rect(-size, -size, size * 2, size * 2);
    ctx.fill();
    ctx.stroke();
    // Inner diamond
    const is = size * 0.6;
    ctx.fillStyle = color + '44';
    ctx.beginPath();
    ctx.rect(-is, -is, is * 2, is * 2);
    ctx.fill();
    ctx.stroke();
    ctx.rotate(-Math.PI / 4);
    // Turret barrel (points at target)
    ctx.save();
    ctx.rotate(angle);
    ctx.fillStyle = color;
    ctx.fillRect(-2, -size * 1.3, 4, size * 0.8);
    // Barrel tip glow
    const tipGrad = ctx.createRadialGradient(0, -size * 1.3, 0, 0, -size * 1.3, 6);
    tipGrad.addColorStop(0, '#ffffff');
    tipGrad.addColorStop(0.5, color);
    tipGrad.addColorStop(1, color + '00');
    ctx.fillStyle = tipGrad;
    ctx.beginPath();
    ctx.arc(0, -size * 1.3, 4 + Math.sin(gameTime * 8) * 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // Center core
    const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.35);
    coreGrad.addColorStop(0, '#ffffff');
    coreGrad.addColorStop(0.4, color);
    coreGrad.addColorStop(1, color + '00');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.3, 0, Math.PI * 2);
    ctx.fill();

  } else if (type === 'plasma') {
    // Hexagonal body with swirling plasma core
    ctx.fillStyle = color + '22';
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i - Math.PI / 6;
      const px = Math.cos(a) * size * 1.15;
      const py = Math.sin(a) * size * 1.15;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Inner hex
    ctx.fillStyle = color + '33';
    ctx.strokeStyle = color + '88';
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i;
      const px = Math.cos(a) * size * 0.65;
      const py = Math.sin(a) * size * 0.65;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Rotating plasma swirls
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    for (let s = 0; s < 3; s++) {
      ctx.beginPath();
      const startA = angle * 2.5 + s * Math.PI * 2 / 3;
      for (let j = 0; j <= 16; j++) {
        const t = j / 16;
        const a = startA + t * Math.PI;
        const r = size * 0.15 + t * size * 0.5;
        const px = Math.cos(a) * r;
        const py = Math.sin(a) * r;
        j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.globalAlpha = 0.6;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
    // Center plasma ball
    const plasmaGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.3);
    plasmaGrad.addColorStop(0, '#ffffff');
    plasmaGrad.addColorStop(0.3, color);
    plasmaGrad.addColorStop(1, color + '00');
    ctx.fillStyle = plasmaGrad;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.25 + Math.sin(gameTime * 6) * 2, 0, Math.PI * 2);
    ctx.fill();

  } else if (type === 'tesla') {
    // Triangle body with electricity arcs
    ctx.fillStyle = color + '22';
    ctx.beginPath();
    for (let i = 0; i < 3; i++) {
      const a = Math.PI * 2 / 3 * i - Math.PI / 2;
      const px = Math.cos(a) * size * 1.25;
      const py = Math.sin(a) * size * 1.25;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Inner inverted triangle
    ctx.fillStyle = color + '33';
    ctx.strokeStyle = color + '88';
    ctx.beginPath();
    for (let i = 0; i < 3; i++) {
      const a = Math.PI * 2 / 3 * i + Math.PI / 6;
      const px = Math.cos(a) * size * 0.55;
      const py = Math.sin(a) * size * 0.55;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Lightning bolt through center
    ctx.fillStyle = color;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    ctx.save();
    ctx.rotate(angle * 1.5);
    ctx.beginPath();
    ctx.moveTo(0, -size * 0.7);
    ctx.lineTo(size * 0.2, -size * 0.1);
    ctx.lineTo(-size * 0.05, -size * 0.05);
    ctx.lineTo(size * 0.05, size * 0.05);
    ctx.lineTo(-size * 0.2, size * 0.1);
    ctx.lineTo(0, size * 0.7);
    ctx.stroke();
    ctx.restore();
    // Mini arcs from tips
    ctx.strokeStyle = color + 'aa';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const a = Math.PI * 2 / 3 * i - Math.PI / 2;
      const tx = Math.cos(a) * size * 1.25;
      const ty = Math.sin(a) * size * 1.25;
      const endA = a + (Math.random() - 0.5) * 1.5;
      const endR = size * (1.4 + Math.random() * 0.6);
      const ex = Math.cos(endA) * endR;
      const ey = Math.sin(endA) * endR;
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      const mx = (tx + ex) / 2 + (Math.random() - 0.5) * 8;
      const my = (ty + ey) / 2 + (Math.random() - 0.5) * 8;
      ctx.quadraticCurveTo(mx, my, ex, ey);
      ctx.globalAlpha = 0.3 + Math.random() * 0.4;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
    // Center tesla coil glow
    const teslaGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.4);
    teslaGrad.addColorStop(0, '#ffffff');
    teslaGrad.addColorStop(0.3, color);
    teslaGrad.addColorStop(1, color + '00');
    ctx.fillStyle = teslaGrad;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.3 + Math.sin(gameTime * 10) * 2, 0, Math.PI * 2);
    ctx.fill();

  } else if (type === 'cryo') {
    // Double circle with frost patterns
    ctx.fillStyle = color + '18';
    ctx.beginPath();
    ctx.arc(0, 0, size * 1.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // Inner circle
    ctx.fillStyle = color + '28';
    ctx.strokeStyle = color + '88';
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.65, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // Snowflake with branching
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    for (let i = 0; i < 6; i++) {
      ctx.save();
      ctx.rotate(angle * 0.3 + Math.PI / 3 * i);
      // Main arm
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, -size * 0.95);
      ctx.stroke();
      // Side branches
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.35);
      ctx.lineTo(-size * 0.22, -size * 0.55);
      ctx.moveTo(0, -size * 0.35);
      ctx.lineTo(size * 0.22, -size * 0.55);
      ctx.moveTo(0, -size * 0.6);
      ctx.lineTo(-size * 0.18, -size * 0.78);
      ctx.moveTo(0, -size * 0.6);
      ctx.lineTo(size * 0.18, -size * 0.78);
      ctx.stroke();
      // Tip crystal
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.95);
      ctx.lineTo(-3, -size * 0.85);
      ctx.lineTo(3, -size * 0.85);
      ctx.closePath();
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.restore();
    }
    // Center frost crystal
    const cryoGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.3);
    cryoGrad.addColorStop(0, '#ffffff');
    cryoGrad.addColorStop(0.4, color);
    cryoGrad.addColorStop(1, color + '00');
    ctx.fillStyle = cryoGrad;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.2 + Math.sin(gameTime * 4) * 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Floating frost particles around tower
    ctx.fillStyle = '#aaddff';
    for (let i = 0; i < 4; i++) {
      const pa = gameTime * 1.5 + i * Math.PI / 2;
      const pr = size * (0.8 + Math.sin(gameTime * 3 + i) * 0.2);
      ctx.globalAlpha = 0.4 + Math.sin(gameTime * 4 + i * 2) * 0.3;
      ctx.beginPath();
      ctx.arc(Math.cos(pa) * pr, Math.sin(pa) * pr, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

  } else if (type === 'flame') {
    // Flame tower - pentagon with fire tongues
    ctx.fillStyle = color + '22';
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = Math.PI * 2 / 5 * i - Math.PI / 2;
      ctx.lineTo(Math.cos(a) * size * 1.1, Math.sin(a) * size * 1.1);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Fire tongues
    for (let i = 0; i < 5; i++) {
      const a = angle * 3 + i * Math.PI * 2 / 5;
      const r = size * (0.5 + Math.sin(gameTime * 8 + i * 1.3) * 0.25);
      const x2 = Math.cos(a) * r;
      const y2 = Math.sin(a) * r;
      const fireGrad = ctx.createRadialGradient(x2, y2, 0, x2, y2, size * 0.3);
      fireGrad.addColorStop(0, '#ffff00');
      fireGrad.addColorStop(0.4, color);
      fireGrad.addColorStop(1, color + '00');
      ctx.fillStyle = fireGrad;
      ctx.beginPath();
      ctx.arc(x2, y2, size * 0.25, 0, Math.PI * 2);
      ctx.fill();
    }
    // Center fire core
    const fireCore = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.4);
    fireCore.addColorStop(0, '#ffffff');
    fireCore.addColorStop(0.2, '#ffff44');
    fireCore.addColorStop(0.6, color);
    fireCore.addColorStop(1, color + '00');
    ctx.fillStyle = fireCore;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.35 + Math.sin(gameTime * 10) * 2, 0, Math.PI * 2);
    ctx.fill();

  } else if (type === 'sniper') {
    // Sniper - long cross shape with scope
    ctx.fillStyle = color + '22';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.fillRect(-size * 0.2, -size * 1.4, size * 0.4, size * 2.8);
    ctx.strokeRect(-size * 0.2, -size * 1.4, size * 0.4, size * 2.8);
    ctx.fillRect(-size * 0.8, -size * 0.2, size * 1.6, size * 0.4);
    ctx.strokeRect(-size * 0.8, -size * 0.2, size * 1.6, size * 0.4);
    // Scope circle
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.5, 0, Math.PI * 2);
    ctx.stroke();
    // Scope crosshair
    ctx.strokeStyle = color + '88';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-size * 0.3, 0); ctx.lineTo(size * 0.3, 0);
    ctx.moveTo(0, -size * 0.3); ctx.lineTo(0, size * 0.3);
    ctx.stroke();
    // Center dot
    const sniperCore = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.15);
    sniperCore.addColorStop(0, '#ffffff');
    sniperCore.addColorStop(0.5, color);
    sniperCore.addColorStop(1, color + '00');
    ctx.fillStyle = sniperCore;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.12, 0, Math.PI * 2);
    ctx.fill();

  } else if (type === 'pulse') {
    // Pulse - concentric rings that pulse outward
    for (let r = 3; r >= 0; r--) {
      const ringR2 = size * (0.3 + r * 0.25) + Math.sin(gameTime * 5 - r * 0.8) * 3;
      ctx.globalAlpha = 0.6 - r * 0.12;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, ringR2, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // Arrow indicators
    for (let i = 0; i < 4; i++) {
      const a = angle * 2 + i * Math.PI / 2;
      const ax = Math.cos(a) * size * 0.9;
      const ay = Math.sin(a) * size * 0.9;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(ax + Math.cos(a) * 5, ay + Math.sin(a) * 5);
      ctx.lineTo(ax + Math.cos(a + 0.5) * -5, ay + Math.sin(a + 0.5) * -5);
      ctx.lineTo(ax + Math.cos(a - 0.5) * -5, ay + Math.sin(a - 0.5) * -5);
      ctx.closePath();
      ctx.fill();
    }
    // Center glow
